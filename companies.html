be\u03b1\u03b3\u03c9\u03b3\u03ad\u03c2 \u03c3\u03b5 50 \u03c7\u03ce\u03c1\u03b5\u03c2\n\n\u0395\u03af\u03bc\u03b1\u03c3\u03c4\u03b5 \u03bf \u03ba\u03bf\u03c1\u03c5\u03c6\u03b1\u03af\u03bf\u03c2 \u03cc\u03bc\u03b9\u03bb\u03bf\u03c2 \u03c4\u03c1\u03bf\u03c6\u03af\u03bc\u03c9\u03bd \u03ba\u03b1\u03b9 \u03c5\u03c0\u03b7\u03c1\u03b5\u03c3\u03b9\u03ce\u03bd \u03b5\u03c3\u03c4\u03af\u03b1\u03c3\u03b7\u03c2 \u03c3\u03c4\u03b7\u03bd \u0395\u03bb\u03bb\u03ac\u03b4\u03b1.\n\u0394\u03c1\u03b1\u03c3\u03c4\u03b7\u03c1\u03b9\u03bf\u03c0\u03bf\u03b9\u03bf\u03cd\u03bc\u03b1\u03c3\u03c4\u03b5 \u03b3\u03b9\u03b1 \u03c0\u03b5\u03c1\u03b9\u03c3\u03c3\u03cc\u03c4\u03b5\u03c1\u03b5\u03c2 \u03b1\u03c0\u03cc 7 \u03b4\u03b5\u03ba\u03b1\u03b5\u03c4\u03af\u03b5\u03c2 \u03c3\u03c4\u03b7\u03bd \u03b5\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ae \u03b1\u03b3\u03bf\u03c1\u03ac, \u03bc\u03b5 8.500 \u03b5\u03c1\u03b3\u03b1\u03b6\u03bf\u03bc\u03ad\u03bd\u03bf\u03c5\u03c2, \u03c0\u03b5\u03c1\u03b9\u03c3\u03c3\u03cc\u03c4\u03b5\u03c1\u03b1 \u03b1\u03c0\u03cc 25.000 \u03c3\u03b7\u03bc\u03b5\u03af\u03b1 \u03c0\u03ce\u03bb\u03b7\u03c3\u03b7\u03c2 \u03ba\u03b1\u03b9 \u03c0\u03ac\u03bd\u03c9 \u03b1\u03c0\u03cc 1.500 \u03ba\u03c9\u03b4\u03b9\u03ba\u03bf\u03cd\u03c2 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03b3\u03b9\u03b1 \u03ba\u03ac\u03b8\u03b5 \u03b4\u03b9\u03b1\u03c4\u03c1\u03bf\u03c6\u03b9\u03ba\u03ae \u03b1\u03bd\u03ac\u03b3\u03ba\u03b7 \u03ba\u03b1\u03b9 \u03c3\u03c4\u03b9\u03b3\u03bc\u03ae \u03c4\u03b7\u03c2 \u03b7\u03bc\u03ad\u03c1\u03b1\u03c2.\n\u0397 Vivartia \u03a3\u03c5\u03bc\u03bc\u03b5\u03c4\u03bf\u03c7\u03ce\u03bd \u0391.\u0395. \u03b5\u03af\u03bd\u03b1\u03b9 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae\u03c2 \u03c4\u03c1\u03bf\u03c6\u03af\u03bc\u03c9\u03bd \u03c3\u03c4\u03b7\u03bd \u0395\u03bb\u03bb\u03ac\u03b4\u03b1. \u0397 \u03ad\u03b4\u03c1\u03b1 \u03c4\u03b7\u03c2 \u03b2\u03c1\u03af\u03c3\u03ba\u03b5\u03c4\u03b1\u03b9 \u03c3\u03c4\u03b1 \u03a3\u03c0\u03ac\u03c4\u03b1 \u03c4\u03b7\u03c2 \u0391\u03c4\u03c4\u03b9\u03ba\u03ae\u03c2.[1]\n            "}, {"color": "#1f77b4", "id": "\u0394\u03ad\u03bb\u03c4\u03b1 \u03a4\u03c1\u03cc\u03c6\u03b9\u03bc\u03b1 \u0391\u0395", "label": "\u0394\u03ad\u03bb\u03c4\u03b1 \u03a4\u03c1\u03cc\u03c6\u03b9\u03bc\u03b1 \u0391\u0395", "shape": "dot", "title": "\n            \u0394\u03ad\u03bb\u03c4\u03b1 \u03a4\u03c1\u03cc\u03c6\u03b9\u03bc\u03b1 \u0391\u0395,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u0395\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03a4\u03c1\u03bf\u03c6\u03af\u03bc\u03c9\u03bd,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u03a3\u03bf\u03cd\u03c0\u03b5\u03c1 \u03bc\u03ac\u03c1\u03ba\u03b5\u03c4 - \u03a4\u03c1\u03cc\u03c6\u03b9\u03bc\u03b1,\n            \u039a\u03ad\u03c1\u03b4\u03b7: https://www.delta.gr/wp-content/uploads/2024/09/financial-statements-2023.pdf|\u03b1 \u039a\u03ad\u03c1\u03b4\u03b7 \u03a0\u03c1\u03bf \u03c6\u03cc\u03c1\u03c9\u03bd \u03a4\u03cc\u03ba\u03c9\u03bd \u03ba\u03b1\u03b9 \u0391\u03c0\u03bf\u03c3\u03b2\u03ad\u03c3\u03b5\u03c9\u03bd, \u03b5\u03be\u03b1\u03b9\u03c1\u03bf\u03c5\u03bc\u03ad\u03bd\u03c9\u03bd \u03c4\u03c9\u03bd \u03bc\u03b7 \u03b5\u03c0\u03b1\u03bd\u03b1\u03bb\u03b1\u03bc\u03b2\u03b1\u03bd\u03cc\u03bc\u03b5\u03bd\u03c9\u03bd \u03b3\u03b5\u03b3\u03bf\u03bd\u03cc\u03c4\u03c9\u03bd \u03ba\u03b1\u03b9 \u03c3\u03c5\u03bc\u03c0\u03b5\u03c1\u03b9\u03bb\u03b1\u03bc\u03b2\u03b1\u03bd\u03cc\u03bc\u03b5\u03bd\u03b7\u03c2 \u03c4\u03b7\u03c2 \u03b5\u03c0\u03af\u03b4\u03c1\u03b1\u03c3\u03b7\u03c2 \u03b1\u03c0\u03cc \u0394\u03a0\u03a7\u0391 16, \u03c0\u03b1\u03c1\u03bf\u03c5\u03c3\u03af\u03b1\u03c3\u03b1\u03bd \u03b1\u03cd\u03be\u03b7\u03c3\u03b7 \u03c3\u03b5 \u03c3\u03c7\u03ad\u03c3\u03b7 \u03bc\u03b5 \u03c4\u03b7\u03bd \u03c0\u03c1\u03bf\u03b7\u03b3\u03bf\u03cd\u03bc\u03b5\u03bd\u03b7 \u039f\u03b9\u03ba\u03bf\u03bd\u03bf\u03bc\u03b9\u03ba\u03ae \u03a7\u03c1\u03ae\u03c3\u03b7 \u03ba\u03b1\u03b9 \u03b1\u03bd\u03ae\u03bb\u03b8\u03b1\u03bd \u03c3\u03b5 \u20ac 13,0 \u03b5\u03ba\u03b1\u03c4. (2022: \u20ac -2,3 \u03b5\u03ba\u03b1\u03c4.)\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            \u0397 \u0394\u0395\u039b\u03a4\u0391 \u03b5\u03af\u03bd\u03b1\u03b9 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03c4\u03c1\u03bf\u03c6\u03af\u03bc\u03c9\u03bd \u03c0\u03bf\u03c5 \u03b4\u03c1\u03b1\u03c3\u03c4\u03b7\u03c1\u03b9\u03bf\u03c0\u03bf\u03b9\u03b5\u03af\u03c4\u03b1\u03b9 \u03c3\u03c4\u03bf\u03bd \u03c7\u03ce\u03c1\u03bf \u03c4\u03b7\u03c2 \u03ba\u03b1\u03bb\u03ae\u03c2 \u03b4\u03b9\u03b1\u03c4\u03c1\u03bf\u03c6\u03ae\u03c2. \u0393\u03b9\u03b1 \u03c0\u03b5\u03c1\u03b9\u03c3\u03c3\u03cc\u03c4\u03b5\u03c1\u03b1 \u03b1\u03c0\u03cc 70 \u03c7\u03c1\u03cc\u03bd\u03b9\u03b1, \u03c0\u03c1\u03bf\u03c3\u03c6\u03ad\u03c1\u03b5\u03b9 \u03c0\u03bf\u03b9\u03bf\u03c4\u03b9\u03ba\u03ac \u03ba\u03b1\u03b9 \u03ba\u03b1\u03b9\u03bd\u03bf\u03c4\u03cc\u03bc\u03b1 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03b1, \u03c4\u03b1 \u03bf\u03c0\u03bf\u03af\u03b1 \u03ba\u03b1\u03bb\u03cd\u03c0\u03c4\u03bf\u03c5\u03bd \u03c4\u03b9\u03c2 \u03c3\u03cd\u03b3\u03c7\u03c1\u03bf\u03bd\u03b5\u03c2 \u03b4\u03b9\u03b1\u03c4\u03c1\u03bf\u03c6\u03b9\u03ba\u03ad\u03c2 \u03b1\u03bd\u03ac\u03b3\u03ba\u03b5\u03c2 \u03c4\u03c9\u03bd \u03ba\u03b1\u03c4\u03b1\u03bd\u03b1\u03bb\u03c9\u03c4\u03ce\u03bd \u03c3\u03c4\u03b7\u03bd \u0395\u03bb\u03bb\u03ac\u03b4\u03b1 \u03ba\u03b1\u03b9 \u03c4\u03b1\u03c5\u03c4\u03cc\u03c7\u03c1\u03bf\u03bd\u03b1 \u03c0\u03c1\u03bf\u03ac\u03b3\u03bf\u03c5\u03bd \u03b4\u03b9\u03b5\u03b8\u03bd\u03ce\u03c2 \u03c4\u03bf \u03b5\u03c5 \u03b6\u03b7\u03bd \u03c4\u03b7\u03c2 \u03b5\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ae\u03c2 \u03bc\u03b5\u03c3\u03bf\u03b3\u03b5\u03b9\u03b1\u03ba\u03ae\u03c2 \u03b4\u03b9\u03b1\u03c4\u03c1\u03bf\u03c6\u03ae\u03c2. \u0394\u03b9\u03b1\u03b8\u03ad\u03c4\u03b5\u03b9 \u03b5\u03c5\u03c1\u03b5\u03af\u03b1 \u03b3\u03ba\u03ac\u03bc\u03b1 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd, \u03b7 \u03bf\u03c0\u03bf\u03af\u03b1 \u03c0\u03b5\u03c1\u03b9\u03bb\u03b1\u03bc\u03b2\u03ac\u03bd\u03b5\u03b9 \u03b3\u03ac\u03bb\u03b1, \u03b3\u03b9\u03b1\u03bf\u03cd\u03c1\u03c4\u03b9, \u03c7\u03c5\u03bc\u03bf\u03cd\u03c2, \u03c0\u03b1\u03b3\u03c9\u03bc\u03ad\u03bd\u03bf \u03c4\u03c3\u03ac\u03b9, \u03c6\u03c5\u03c4\u03b9\u03ba\u03ac \u03ba\u03b1\u03b9 \u03c4\u03c5\u03c1\u03bf\u03ba\u03bf\u03bc\u03b9\u03ba\u03ac \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03b1, \u03ad\u03c7\u03bf\u03bd\u03c4\u03b1\u03c2 \u03b7\u03b3\u03b5\u03c4\u03b9\u03ba\u03ae \u03c0\u03b1\u03c1\u03bf\u03c5\u03c3\u03af\u03b1 \u03c3\u03b5 \u03c0\u03bf\u03bb\u03bb\u03bf\u03cd\u03c2 \u03b1\u03c0\u03cc \u03c4\u03bf\u03c5\u03c2 \u03c4\u03bf\u03bc\u03b5\u03af\u03c2 \u03b4\u03c1\u03b1\u03c3\u03c4\u03b7\u03c1\u03b9\u03bf\u03c0\u03bf\u03af\u03b7\u03c3\u03ae\u03c2 \u03c4\u03b7\u03c2. \u0397 \u0394\u0395\u039b\u03a4\u0391, \u03bc\u03b5 \u03b3\u03bd\u03ce\u03bc\u03bf\u03bd\u03b1 \u03c4\u03b7\u03bd \u03c0\u03c1\u03bf\u03c3\u03c4\u03b1\u03c3\u03af\u03b1 \u03c4\u03bf\u03c5 \u03c0\u03b5\u03c1\u03b9\u03b2\u03ac\u03bb\u03bb\u03bf\u03bd\u03c4\u03bf\u03c2, \u03c4\u03b7 \u03c3\u03c4\u03ae\u03c1\u03b9\u03be\u03b7 \u03c4\u03b7\u03c2 \u03ba\u03bf\u03b9\u03bd\u03c9\u03bd\u03af\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03c4\u03b7 \u03c7\u03c1\u03b7\u03c3\u03c4\u03ae \u03b4\u03b9\u03b1\u03ba\u03c5\u03b2\u03ad\u03c1\u03bd\u03b7\u03c3\u03b7, \u03b4\u03b7\u03bc\u03b9\u03bf\u03c5\u03c1\u03b3\u03b5\u03af \u03b5\u03c0\u03b9\u03c0\u03c1\u03cc\u03c3\u03b8\u03b5\u03c4\u03b7 \u03b1\u03be\u03af\u03b1 \u03b3\u03b9\u03b1 \u03cc\u03bb\u03b1 \u03c4\u03b1 \u03b5\u03bd\u03b4\u03b9\u03b1\u03c6\u03b5\u03c1\u03cc\u03bc\u03b5\u03bd\u03b1 \u03bc\u03ad\u03c1\u03b7 \u03c4\u03b7\u03c2, \u03c3\u03c5\u03bc\u03b2\u03ac\u03bb\u03bb\u03bf\u03bd\u03c4\u03b1\u03c2 \u03ba\u03b1\u03b8\u03bf\u03c1\u03b9\u03c3\u03c4\u03b9\u03ba\u03ac \u03c3\u03c4\u03b7\u03bd \u03bf\u03b9\u03ba\u03bf\u03bd\u03bf\u03bc\u03af\u03b1 \u03ba\u03b1\u03b9 \u03b5\u03c5\u03b7\u03bc\u03b5\u03c1\u03af\u03b1 \u03c4\u03b7\u03c2 \u03c7\u03ce\u03c1\u03b1\u03c2.\n            "}, {"color": "#1f77b4", "id": "\u0395\u03a5\u03a1\u03a9\u03a4\u03a1\u039f\u03a6\u0395\u03a3 \u039c\u039f\u039d. \u0391\u0392\u0395\u0395", "label": "\u0395\u03a5\u03a1\u03a9\u03a4\u03a1\u039f\u03a6\u0395\u03a3 \u039c\u039f\u039d. \u0391\u0392\u0395\u0395", "shape": "dot", "title": "\n            \u0395\u03a5\u03a1\u03a9\u03a4\u03a1\u039f\u03a6\u0395\u03a3 \u039c\u039f\u039d. \u0391\u0392\u0395\u0395,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u0392\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1 \u03a3\u03cd\u03bd\u03b8\u03b5\u03c4\u03c9\u03bd \u03a3\u03c5\u03bc\u03c0\u03c5\u03ba\u03bd\u03c9\u03bc\u03ad\u03bd\u03c9\u03bd \u0396\u03c9\u03bf\u03c4\u03c1\u03bf\u03c6\u03ce\u03bd,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u0391\u03b3\u03c1\u03bf\u03c4\u03b9\u03ba\u03ae \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae,\n            \u039a\u03ad\u03c1\u03b4\u03b7: None\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            \u0395\u03b4\u03ce \u03ba\u03b1\u03b9 4 \u03b4\u03b5\u03ba\u03b1\u03b5\u03c4\u03af\u03b5\u03c2, \u03b7 \u0395\u03a5\u03a1\u03a9\u03a4\u03a1\u039f\u03a6\u0395\u03a3 \u039c\u039f\u039d. \u0391\u0392\u0395\u0395 \u03ad\u03c7\u03b5\u03b9 \u03b8\u03ad\u03c3\u03b5\u03b9 \u03c9\u03c2 \u03c0\u03c1\u03c9\u03c4\u03b1\u03c1\u03c7\u03b9\u03ba\u03cc \u03bc\u03ad\u03bb\u03b7\u03bc\u03b1 \u03c4\u03b7\u03bd \u03c0\u03bf\u03b9\u03bf\u03c4\u03b9\u03ba\u03ae \u03ba\u03b1\u03b9 \u03ac\u03bc\u03b5\u03c3\u03b7 \u03b5\u03be\u03c5\u03c0\u03b7\u03c1\u03ad\u03c4\u03b7\u03c3\u03b7 \u03c4\u03bf\u03c5 \u03b4\u03b9\u03ba\u03c4\u03cd\u03bf\u03c5 \u03c4\u03c9\u03bd \u03c3\u03c5\u03bd\u03b5\u03c1\u03b3\u03b1\u03b6\u03cc\u03bc\u03b5\u03bd\u03c9\u03bd \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ce\u03bd \u03b3\u03ac\u03bb\u03b1\u03ba\u03c4\u03bf\u03c2. \u03a3\u03c4\u03c1\u03b1\u03c4\u03b7\u03b3\u03b9\u03ba\u03cc\u03c2 \u03c3\u03c4\u03cc\u03c7\u03bf\u03c2 \u03c4\u03b7\u03c2 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1\u03c2 \u03b5\u03af\u03bd\u03b1\u03b9 \u03b7 \u03b9\u03ba\u03b1\u03bd\u03bf\u03c0\u03bf\u03af\u03b7\u03c3\u03b7 \u03c4\u03c9\u03bd \u03b1\u03bd\u03b1\u03b3\u03ba\u03ce\u03bd \u03ba\u03b1\u03b9 \u03b1\u03c0\u03b1\u03b9\u03c4\u03ae\u03c3\u03b5\u03c9\u03bd \u03c4\u03c9\u03bd \u03c0\u03b5\u03bb\u03b1\u03c4\u03ce\u03bd \u03ba\u03b1\u03b9 \u03c3\u03c5\u03bd\u03b5\u03c1\u03b3\u03b1\u03c4\u03ce\u03bd \u03c4\u03b7\u03c2, \u03bc\u03ad\u03c3\u03b1 \u03b1\u03c0\u03cc \u03c4\u03b7\u03bd \u03c0\u03c1\u03bf\u03c3\u03c6\u03bf\u03c1\u03ac \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd, \u03c5\u03c8\u03b7\u03bb\u03ae\u03c2 \u03b4\u03b9\u03b1\u03c4\u03c1\u03bf\u03c6\u03b9\u03ba\u03ae\u03c2 \u03b1\u03be\u03af\u03b1\u03c2 \u03b3\u03b9\u03b1 \u03c4\u03b1 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03b9\u03ba\u03ac \u03b6\u03ce\u03b1, \u03c0\u03b1\u03c1\u03b1\u03c3\u03ba\u03b5\u03c5\u03b1\u03c3\u03bc\u03ad\u03bd\u03c9\u03bd \u03bc\u03b5 \u03b1\u03c5\u03c3\u03c4\u03b7\u03c1\u03ad\u03c2 \u03c0\u03c1\u03bf\u03b4\u03b9\u03b1\u03b3\u03c1\u03b1\u03c6\u03ad\u03c2.\n\n\u03a0\u03b1\u03c1\u03ac\u03bb\u03bb\u03b7\u03bb\u03b1, \u03c3\u03c4\u03bf\u03c7\u03b5\u03cd\u03b5\u03b9 \u03c3\u03c4\u03b7 \u03c3\u03c5\u03bd\u03b5\u03c7\u03ae \u03b5\u03be\u03ad\u03bb\u03b9\u03be\u03b7 \u03c4\u03c9\u03bd \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03c4\u03b7\u03c2 \u03bc\u03b5 \u03ad\u03bc\u03c6\u03b1\u03c3\u03b7 \u03c3\u03c4\u03b7\u03bd \u03b5\u03c5\u03b7\u03bc\u03b5\u03c1\u03af\u03b1 \u03c4\u03c9\u03bd \u03b6\u03ce\u03c9\u03bd \u03ba\u03b1\u03b9 \u03c4\u03b7 \u03c3\u03c5\u03c3\u03c4\u03b7\u03bc\u03b1\u03c4\u03b9\u03ba\u03ae \u03c3\u03c4\u03ae\u03c1\u03b9\u03be\u03b7 \u03c4\u03c9\u03bd \u03c3\u03c5\u03bd\u03b5\u03c1\u03b3\u03b1\u03b6\u03cc\u03bc\u03b5\u03bd\u03c9\u03bd \u03ba\u03c4\u03b7\u03bd\u03bf\u03c4\u03c1\u03cc\u03c6\u03c9\u03bd. \u0397 \u00ab\u0395\u03a5\u03a1\u03a9\u03a4\u03a1\u039f\u03a6\u0395\u03a3\u00bb \u03b1\u03c0\u03bf\u03c4\u03b5\u03bb\u03b5\u03af \u03b2\u03b1\u03c3\u03b9\u03ba\u03cc \u03c0\u03c1\u03bf\u03bc\u03b7\u03b8\u03b5\u03c5\u03c4\u03ae \u03bc\u03b5\u03b9\u03b3\u03bc\u03ac\u03c4\u03c9\u03bd \u03b6\u03c9\u03bf\u03c4\u03c1\u03bf\u03c6\u03ce\u03bd \u03b3\u03b9\u03b1 \u03c4\u03bf \u03b4\u03af\u03ba\u03c4\u03c5\u03bf \u03c0\u03c1\u03bf\u03bc\u03b7\u03b8\u03b5\u03c5\u03c4\u03ce\u03bd \u03b3\u03ac\u03bb\u03b1\u03ba\u03c4\u03bf\u03c2 \u03c4\u03b7\u03c2 \u0394\u0395\u039b\u03a4\u0391, \u03b5\u03bd\u03ce \u03c0\u03b1\u03c1\u03ac\u03bb\u03bb\u03b7\u03bb\u03b1 \u03b1\u03c0\u03b5\u03c5\u03b8\u03cd\u03bd\u03b5\u03c4\u03b1\u03b9 \u03ba\u03b1\u03b9 \u03c3\u03b5 \u03ac\u03bb\u03bb\u03bf\u03c5\u03c2 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03bf\u03cd\u03c2/\u03ba\u03c4\u03b7\u03bd\u03bf\u03c4\u03c1\u03cc\u03c6\u03bf\u03c5\u03c2, \u03bf\u03b9 \u03bf\u03c0\u03bf\u03af\u03bf\u03b9 \u03b5\u03c0\u03b9\u03ba\u03b5\u03bd\u03c4\u03c1\u03ce\u03bd\u03bf\u03bd\u03c4\u03b1\u03b9 \u03c3\u03c4\u03b7\u03bd \u03b1\u03c3\u03c6\u03ac\u03bb\u03b5\u03b9\u03b1, \u03c0\u03bf\u03b9\u03cc\u03c4\u03b7\u03c4\u03b1 \u03ba\u03b1\u03b9 \u03c5\u03c8\u03b7\u03bb\u03ae \u03b4\u03b9\u03b1\u03c4\u03c1\u03bf\u03c6\u03b9\u03ba\u03ae \u03b1\u03be\u03af\u03b1 \u03c4\u03c9\u03bd \u03b6\u03c9\u03bf\u03c4\u03c1\u03bf\u03c6\u03ce\u03bd \u03c0\u03bf\u03c5 \u03c0\u03c1\u03bf\u03c3\u03c6\u03ad\u03c1\u03bf\u03c5\u03bd \u03c3\u03c4\u03bf \u03b6\u03c9\u03ca\u03ba\u03cc \u03c4\u03bf\u03c5\u03c2 \u03ba\u03b5\u03c6\u03ac\u03bb\u03b1\u03b9\u03bf.\n            "}, {"color": "#1f77b4", "id": "\u0394\u0391\u039d\u0399\u0397\u039b \u03a3. \u0393\u039a\u0391\u03a4\u0395\u039d\u0399\u039f \u0026 \u03a5\u0399\u039f\u03a3 \u0391.\u0395.", "label": "\u0394\u0391\u039d\u0399\u0397\u039b \u03a3. \u0393\u039a\u0391\u03a4\u0395\u039d\u0399\u039f \u0026 \u03a5\u0399\u039f\u03a3 \u0391.\u0395.", "shape": "dot", "title": "\n            \u0394\u0391\u039d\u0399\u0397\u039b \u03a3. \u0393\u039a\u0391\u03a4\u0395\u039d\u0399\u039f \u0026 \u03a5\u0399\u039f\u03a3 \u0391.\u0395.,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u0393\u03ac\u03bb\u03b1 \u03ba\u03b1\u03b9 \u03ba\u03b1\u03ba\u03ac\u03bf,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u03a3\u03bf\u03cd\u03c0\u03b5\u03c1 \u03bc\u03ac\u03c1\u03ba\u03b5\u03c4 - \u03a4\u03c1\u03cc\u03c6\u03b9\u03bc\u03b1,\n            \u039a\u03ad\u03c1\u03b4\u03b7: None\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            \u0397 \u03b9\u03c3\u03c4\u03bf\u03c1\u03af\u03b1 \u03c4\u03b7\u03c2 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1\u03c2 \u0394\u0391\u039d\u0399\u0397\u039b \u03a3. \u0393\u039a\u0391\u03a4\u0395\u039d\u0399\u039f \u0026 \u03a5\u0399\u039f\u03a3 \u0391.\u0395. \u03be\u03b5\u03ba\u03b9\u03bd\u03ac \u03c0\u03c1\u03b9\u03bd \u03b1\u03c0\u03cc \u03ad\u03bd\u03b1 \u03c3\u03c7\u03b5\u03b4\u03cc\u03bd \u03b1\u03b9\u03ce\u03bd\u03b1 \u03c3\u03c4\u03b7 \u0398\u03b5\u03c3\u03c3\u03b1\u03bb\u03bf\u03bd\u03af\u03ba\u03b7 \u03bc\u03b5 \u03b1\u03c1\u03c7\u03b9\u03ba\u03ae \u03b2\u03b1\u03c3\u03b9\u03ba\u03ae \u03b4\u03c1\u03b1\u03c3\u03c4\u03b7\u03c1\u03b9\u03cc\u03c4\u03b7\u03c4\u03b1 \u03c4\u03b7\u03bd \u03b5\u03bc\u03c0\u03bf\u03c1\u03af\u03b1 \u03b6\u03ac\u03c7\u03b1\u03c1\u03b7\u03c2 \u0026 \u03ba\u03b1\u03c6\u03ad. \u039c\u03b5\u03c4\u03ac \u03c4\u03bf \u0392\u2019 \u03a0\u03b1\u03b3\u03ba\u03cc\u03c3\u03bc\u03b9\u03bf \u03a0\u03cc\u03bb\u03b5\u03bc\u03bf, \u03b7 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03bc\u03b5\u03c4\u03b1\u03c6\u03ad\u03c1\u03b5\u03c4\u03b1\u03b9 \u03c3\u03c4\u03b7\u03bd \u0391\u03b8\u03ae\u03bd\u03b1, \u03cc\u03c0\u03bf\u03c5 \u03ba\u03b1\u03b9 \u03b4\u03c1\u03b1\u03c3\u03c4\u03b7\u03c1\u03b9\u03bf\u03c0\u03bf\u03b9\u03b5\u03af\u03c4\u03b1\u03b9 \u03c0\u03bb\u03ad\u03bf\u03bd \u03c3\u03c4\u03bf\u03c5\u03c2 \u03c4\u03bf\u03bc\u03b5\u03af\u03c2 \u03c4\u03bf\u03c5 \u03b3\u03ac\u03bb\u03b1\u03ba\u03c4\u03bf\u03c2 \u03ba\u03b1\u03b9 \u03c4\u03bf\u03c5 \u03ba\u03b1\u03ba\u03ac\u03bf \u03bc\u03b5 \u03c4\u03b1 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03b1 \u03c4\u03b7\u03c2 \u03bd\u03b1 \u03b1\u03c0\u03b5\u03c5\u03b8\u03cd\u03bd\u03bf\u03bd\u03c4\u03b1\u03b9 \u03c3\u03c4\u03b7 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03b9\u03ba\u03ae \u03b1\u03b3\u03bf\u03c1\u03ac. \u039a\u03b1\u03b8\u03ce\u03c2 \u03c4\u03b1 \u03c7\u03c1\u03cc\u03bd\u03b9\u03b1 \u03c0\u03b5\u03c1\u03bd\u03bf\u03cd\u03bd, \u03b7 \u0394\u0391\u039d\u0399\u0397\u039b \u03a3. \u0393\u039a\u0391\u03a4\u0395\u039d\u0399\u039f \u0026 \u03a5\u0399\u039f\u03a3 \u0391.\u0395. \u03c3\u03c5\u03bd\u03b5\u03c7\u03af\u03b6\u03b5\u03b9 \u03bd\u03b1 \u03bc\u03b5\u03b3\u03b1\u03bb\u03ce\u03bd\u03b5\u03b9 \u03ba\u03b1\u03b9 \u03bd\u03b1 \u03b1\u03bd\u03b1\u03c0\u03c4\u03cd\u03c3\u03c3\u03b5\u03c4\u03b1\u03b9, \u03c0\u03c1\u03bf\u03c3\u03b8\u03ad\u03c4\u03bf\u03bd\u03c4\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03ba\u03b1\u03c4\u03b1\u03bd\u03b1\u03bb\u03c9\u03c4\u03b9\u03ba\u03ac \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03b1, \u03cc\u03c0\u03c9\u03c2 \u03c4\u03bf \u03b3\u03ac\u03bb\u03b1 \u03b5\u03b2\u03b1\u03c0\u03bf\u03c1\u03ad, \u03c4\u03bf \u03b3\u03ac\u03bb\u03b1 \u03c3\u03b5 \u03c3\u03ba\u03cc\u03bd\u03b7 (Regilait) \u03ba\u03b1\u03b9 \u03ac\u03bb\u03bb\u03b1 \u03b5\u03bd\u03ce \u03c3\u03c4\u03b7 \u03c3\u03c5\u03bd\u03ad\u03c7\u03b5\u03b9\u03b1 \u03b5\u03b9\u03c3\u03ad\u03c1\u03c7\u03b5\u03c4\u03b1\u03b9 \u03ba\u03b1\u03b9 \u03c3\u03c4\u03b7\u03bd \u03b1\u03b3\u03bf\u03c1\u03ac \u03c4\u03c9\u03bd \u03c4\u03c5\u03c1\u03bf\u03ba\u03bf\u03bc\u03b9\u03ba\u03ce\u03bd, \u03b5\u03b9\u03c3\u03ac\u03b3\u03bf\u03bd\u03c4\u03b1\u03c2 Regato \u03b1\u03c0\u03cc \u03c4\u03b7 \u0392\u03cc\u03c1\u03b5\u03b9\u03bf \u0399\u03c1\u03bb\u03b1\u03bd\u03b4\u03af\u03b1 \u03ba\u03b1\u03b9 \u03bc\u03b9\u03b1 \u03bc\u03b5\u03b3\u03ac\u03bb\u03b7 \u03c0\u03bf\u03b9\u03ba\u03b9\u03bb\u03af\u03b1 \u03c4\u03c5\u03c1\u03b9\u03ce\u03bd \u03b1\u03c0\u03cc \u03c4\u03b9\u03c2 \u03c7\u03ce\u03c1\u03b5\u03c2 \u03c4\u03b7\u03c2 \u0394\u03c5\u03c4\u03b9\u03ba\u03ae\u03c2 \u0395\u03c5\u03c1\u03ce\u03c0\u03b7\u03c2 \u03ba\u03b1\u03b9 \u03ba\u03c5\u03c1\u03af\u03c9\u03c2 \u03c4\u03b7 \u0393\u03b5\u03c1\u03bc\u03b1\u03bd\u03af\u03b1. \u039c\u03b5\u03c4\u03ac \u03c4\u03bf 1980 \u03ba\u03b1\u03b9 \u03b5\u03ba\u03bc\u03b5\u03c4\u03b1\u03bb\u03bb\u03b5\u03c5\u03cc\u03bc\u03b5\u03bd\u03b7 \u03c4\u03b7\u03bd \u03c4\u03b1\u03c7\u03cd\u03c4\u03b1\u03c4\u03b7 \u03b1\u03bd\u03ac\u03c0\u03c4\u03c5\u03be\u03b7 \u03c4\u03bf\u03c5 \u03b5\u03bc\u03c0\u03bf\u03c1\u03af\u03bf\u03c5 \u03bb\u03b9\u03b1\u03bd\u03b9\u03ba\u03ae\u03c2, \u03b7 \u0394\u0391\u039d\u0399\u0397\u039b \u03a3. \u0393\u039a\u0391\u03a4\u0395\u039d\u0399\u039f \u0026 \u03a5\u0399\u039f\u03a3 \u0391.\u0395. \u03b1\u03bd\u03b1\u03bb\u03b1\u03bc\u03b2\u03ac\u03bd\u03b5\u03b9 \u03c4\u03b7\u03bd \u03b1\u03bd\u03ac\u03c0\u03c4\u03c5\u03be\u03b7 \u03ba\u03b1\u03b9 \u03b5\u03bc\u03c0\u03bf\u03c1\u03af\u03b1 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03b9\u03b4\u03b9\u03c9\u03c4\u03b9\u03ba\u03ae\u03c2 \u03b5\u03c4\u03b9\u03ba\u03ad\u03c4\u03b1\u03c2. \u03a3\u03ae\u03bc\u03b5\u03c1\u03b1, \u03b7 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03c3\u03c5\u03bd\u03b5\u03c7\u03af\u03b6\u03b5\u03b9 \u03bd\u03b1 \u03b5\u03b9\u03c3\u03ac\u03b3\u03b5\u03b9 \u03ba\u03b1\u03b9 \u03bd\u03b1 \u03b5\u03bc\u03c0\u03bf\u03c1\u03b5\u03cd\u03b5\u03c4\u03b1\u03b9 \u03b3\u03b1\u03bb\u03b1\u03ba\u03c4\u03bf\u03ba\u03bf\u03bc\u03b9\u03ba\u03ac \u03ba\u03b1\u03b9 \u03c4\u03c5\u03c1\u03bf\u03ba\u03bf\u03bc\u03b9\u03ba\u03ac \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03b1, \u03bd\u03b1 \u03c3\u03c5\u03bd\u03b5\u03c1\u03b3\u03ac\u03b6\u03b5\u03c4\u03b1\u03b9 \u03bc\u03b5 \u03cc\u03bb\u03b5\u03c2 \u03c3\u03c7\u03b5\u03b4\u03cc\u03bd \u03c4\u03b9\u03c2 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b5\u03c2 \u03c4\u03bf\u03c5 \u03ba\u03bb\u03ac\u03b4\u03bf\u03c5, \u03bd\u03b1 \u03b4\u03c1\u03b1\u03c3\u03c4\u03b7\u03c1\u03b9\u03bf\u03c0\u03bf\u03b9\u03b5\u03af\u03c4\u03b1\u03b9 \u03c3\u03c4\u03bf \u03bb\u03b9\u03b1\u03bd\u03b9\u03ba\u03cc \u03b5\u03bc\u03c0\u03cc\u03c1\u03b9\u03bf, \u03b5\u03bd\u03ce \u03c0\u03b1\u03c1\u03ac\u03bb\u03bb\u03b7\u03bb\u03b1 \u03b5\u03c0\u03b5\u03ba\u03c4\u03b5\u03af\u03bd\u03b5\u03c4\u03b1\u03b9 \u03c3\u03c4\u03b9\u03c2 \u03b3\u03b5\u03b9\u03c4\u03bf\u03bd\u03b9\u03ba\u03ad\u03c2 \u03b2\u03b1\u03bb\u03ba\u03b1\u03bd\u03b9\u03ba\u03ad\u03c2 \u03c7\u03ce\u03c1\u03b5\u03c2.\n            "}, {"color": "#1f77b4", "id": "\u039a\u039f\u03a5\u03a1\u0395\u039b\u039b\u0391\u03a3", "label": "\u039a\u039f\u03a5\u03a1\u0395\u039b\u039b\u0391\u03a3", "shape": "dot", "title": "\n            \u039a\u039f\u03a5\u03a1\u0395\u039b\u039b\u0391\u03a3,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u0392\u03b9\u03bf\u03bb\u03bf\u03b3\u03b9\u03ba\u03ac \u03b3\u03b1\u03bb\u03b1\u03ba\u03c4\u03bf\u03ba\u03bf\u03bc\u03b9\u03ba\u03ac \u03ba\u03c4\u03bb,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u03a3\u03bf\u03cd\u03c0\u03b5\u03c1 \u03bc\u03ac\u03c1\u03ba\u03b5\u03c4 - \u03a4\u03c1\u03cc\u03c6\u03b9\u03bc\u03b1,\n            \u039a\u03ad\u03c1\u03b4\u03b7: None\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            \u0397 \u039a\u039f\u03a5\u03a1\u0395\u039b\u039b\u0391\u03a3 \u03c0\u03b1\u03c1\u03ac\u03b3\u03b5\u03b9 \u03b1\u03c0\u03bf\u03bb\u03b1\u03c5\u03c3\u03c4\u03b9\u03ba\u03ac \u03b5\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ac \u03b3\u03b1\u03bb\u03b1\u03ba\u03c4\u03bf\u03ba\u03bf\u03bc\u03b9\u03ba\u03ac \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03b1 \u03b1\u03c0\u03cc \u03c4\u03bf 1960. \u03a4\u03bf 1996, \u03b4\u03b7\u03bc\u03b9\u03bf\u03cd\u03c1\u03b3\u03b7\u03c3\u03b5 \u03c4\u03b1 \u03c0\u03c1\u03ce\u03c4\u03b1 \u03b2\u03b9\u03bf\u03bb\u03bf\u03b3\u03b9\u03ba\u03ac \u03b3\u03b1\u03bb\u03b1\u03ba\u03c4\u03bf\u03ba\u03bf\u03bc\u03b9\u03ba\u03ac \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03b1 \u03c3\u03c4\u03b7\u03bd \u0395\u03bb\u03bb\u03ac\u03b4\u03b1. \u03a3\u03ae\u03bc\u03b5\u03c1\u03b1, \u03b7 \u03b2\u03c1\u03b1\u03b2\u03b5\u03c5\u03bc\u03ad\u03bd\u03b7 \u03b2\u03b9\u03bf\u03bb\u03bf\u03b3\u03b9\u03ba\u03ae \u03c4\u03b7\u03c2 \u03c3\u03b5\u03b9\u03c1\u03ac \u03b5\u03be\u03ac\u03b3\u03b5\u03c4\u03b1\u03b9 \u03c3\u03b5 \u03bf\u03bb\u03cc\u03ba\u03bb\u03b7\u03c1\u03bf \u03c4\u03bf\u03bd \u03ba\u03cc\u03c3\u03bc\u03bf, \u03b5\u03bd\u03ce \u03b7 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03ad\u03c7\u03b5\u03b9 \u03b2\u03bf\u03b7\u03b8\u03ae\u03c3\u03b5\u03b9 \u03c0\u03bf\u03bb\u03bb\u03bf\u03cd\u03c2 \u03b1\u03b3\u03c1\u03cc\u03c4\u03b5\u03c2 \u03bd\u03b1 \u03b1\u03ba\u03bf\u03bb\u03bf\u03c5\u03b8\u03ae\u03c3\u03bf\u03c5\u03bd \u03c4\u03bf \u03c0\u03b1\u03c1\u03ac\u03b4\u03b5\u03b9\u03b3\u03bc\u03ac \u03c4\u03b7\u03c2.\n\n\u03a0\u03b1\u03c1\u03ac\u03bb\u03bb\u03b7\u03bb\u03b1, \u03c3\u03c5\u03bd\u03b4\u03c5\u03ac\u03b6\u03bf\u03bd\u03c4\u03b1\u03c2 \u03c0\u03b1\u03c1\u03b1\u03b4\u03bf\u03c3\u03b9\u03b1\u03ba\u03ad\u03c2 \u03c3\u03c5\u03bd\u03c4\u03b1\u03b3\u03ad\u03c2 \u03bc\u03b5 \u03c4\u03b7 \u03c3\u03cd\u03b3\u03c7\u03c1\u03bf\u03bd\u03b7 \u03c4\u03b5\u03c7\u03bd\u03bf\u03bb\u03bf\u03b3\u03af\u03b1, \u03b7 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03b1\u03bd\u03ad\u03c0\u03c4\u03c5\u03be\u03b5 \u03bc\u03b9\u03b1 \u03bf\u03bb\u03cc\u03ba\u03bb\u03b7\u03c1\u03b7 \u03c3\u03b5\u03b9\u03c1\u03ac \u03b1\u03c0\u03cc \u03b5\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ac \u03b3\u03b9\u03b1\u03bf\u03cd\u03c1\u03c4\u03b9\u03b1, \u03b3\u03ac\u03bb\u03b1\u03c4\u03b1 \u03ba\u03b1\u03b9 \u03c7\u03b5\u03b9\u03c1\u03bf\u03c0\u03bf\u03af\u03b7\u03c4\u03b1 \u03c4\u03c5\u03c1\u03b9\u03ac. \u038c\u03bb\u03b1 \u03c4\u03bf\u03c5\u03c2 \u03c6\u03c4\u03b9\u03b1\u03b3\u03bc\u03ad\u03bd\u03b1 \u03bc\u03b5 \u03bb\u03af\u03b3\u03b1 \u03bc\u03cc\u03bd\u 9\u03b1\u03bd\u03bf\u03bc\u03ad\u03b1\u03c2 \u03c4\u03c9\u03bd \u03c0\u03b1\u03b3\u03c9\u03c4\u03ce\u03bd \u03c4\u03b7\u03c2 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1\u03c2 General Mills AE (H\u00e4agen-Dazs) \u03ba\u03b1\u03b9 \u03b1\u03c0\u03bf\u03ba\u03bb\u03b5\u03b9\u03c3\u03c4\u03b9\u03ba\u03cc\u03c2 \u03b4\u03b9\u03b1\u03bd\u03bf\u03bc\u03ad\u03b1\u03c2 \u03c4\u03c9\u03bd \u03c0\u03b1\u03b3\u03c9\u03c4\u03ce\u03bd \u03c4\u03b7\u03c2 Sammontana SPA \u03b3\u03b9\u03b1 \u03c4\u03b7\u03bd \u0395\u03bb\u03bb\u03ac\u03b4\u03b1 \u03ba\u03b1\u03b9 \u039a\u03cd\u03c0\u03c1\u03bf. \u0395\u03c0\u03b9\u03c0\u03bb\u03ad\u03bf\u03bd, \u03c0\u03b1\u03c1\u03ac\u03b3\u03b5\u03b9 \u03c0\u03bf\u03b9\u03bf\u03c4\u03b9\u03ba\u03ac \u03c0\u03b1\u03b3\u03c9\u03c4\u03ac \u03bc\u03b5 \u03c4\u03bf \u03c3\u03ae\u03bc\u03b1 Cold Sin, \u03b5\u03bd\u03ce \u03b4\u03b9\u03b1\u03b8\u03ad\u03c4\u03b5\u03b9 \u03c0\u03b1\u03bd\u03b5\u03bb\u03bb\u03b1\u03b4\u03b9\u03ba\u03cc \u03b4\u03af\u03ba\u03c4\u03c5\u03bf, \u03ba\u03b1\u03bb\u03cd\u03c0\u03c4\u03bf\u03bd\u03c4\u03b1\u03c2 \u03c4\u03b7\u03bd \u03b5\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ae \u03b5\u03c0\u03b9\u03ba\u03c1\u03ac\u03c4\u03b5\u03b9\u03b1 \u03bc\u03b5 \u03c0\u03b5\u03c1\u03af\u03c0\u03bf\u03c5 15.000 \u03c3\u03b7\u03bc\u03b5\u03af\u03b1 \u03c0\u03ce\u03bb\u03b7\u03c3\u03b7\u03c2 \u03c0\u03b1\u03b3\u03c9\u03c4\u03bf\u03cd.\n            "}, {"color": "#1f77b4", "id": "\u039c\u03a0\u0391\u03a1\u039c\u03a0\u0391 \u03a3\u03a4\u0391\u0398\u0397\u03a3", "label": "\u039c\u03a0\u0391\u03a1\u039c\u03a0\u0391 \u03a3\u03a4\u0391\u0398\u0397\u03a3", "shape": "dot", "title": "\n            \u039c\u03a0\u0391\u03a1\u039c\u03a0\u0391 \u03a3\u03a4\u0391\u0398\u0397\u03a3,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u03a4\u03c1\u03cc\u03c6\u03b9\u03bc\u03b1,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u03a3\u03bf\u03cd\u03c0\u03b5\u03c1 \u03bc\u03ac\u03c1\u03ba\u03b5\u03c4 - \u03a4\u03c1\u03cc\u03    "}, {"color": "#1f77b4", "id": "\u039c. \u0391\u03c1\u03b1\u03bc\u03c0\u03b1\u03c4\u03b6\u03ae\u03c2 \u0391.\u0392.\u0395.\u0395.\u2013\u0395\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ae \u0396\u03cd\u03bc\u03b7", "label": "\u039c. \u0391\u03c1\u03b1\u03bc\u03c0\u03b1\u03c4\u03b6\u03ae\u03c2 \u0391.\u0392.\u0395.\u0395.\u2013\u0395\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ae \u0396\u03cd\u03bc\u03b7", "shape": "dot", "title": "\n            \u039c. \u0391\u03c1\u03b1\u03bc\u03c0\u03b1\u03c4\u03b6\u03ae\u03c2 \u0391.\u0392.\u0395.\u0395.\u2013\u0395\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ae \u0396\u03cd\u03bc\u03b7,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u03a0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03b1 \u03ba\u03b1\u03c4\u03b5\u03c8\u03c5\u03b3\u03bc\u03ad\u03bd\u03b7\u03c2 \u03b6\u03cd\u03bc\u03b7\u03c2,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u03a3\u03bf\u03cd\u03c0\u03b5\u03c1 \u03bc\u03ac\u03c1\u03ba\u03b5\u03c4 - \u03a4\u03c1\u03cc\u03c6\u03b9\u03bc\u03b1,\n            \u039a\u03ad\u03c1\u03b4\u03b7: None\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            \u0397 \u039c. \u0391\u03c1\u03b1\u03bc\u03c0\u03b1\u03c4\u03b6\u03ae\u03c2 \u0391.\u0392.\u0395.\u0395.\u2013\u0395\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ae \u0396\u03cd\u03bc\u03b7 \u03b5\u03af\u03bd\u03b1\u03b9 \u03ba\u03bf\u03c1\u03c5\u03c6\u03b1\u03af\u03b1 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03c3\u03c4\u03b7\u03bd \u03b1\u03b3\u03bf\u03c1\u03ac \u03ba\u03b1\u03c4\u03b1\u03c8\u03c5\u03b3\u03bc\u03ad\u03bd\u03c9\u03bd \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03b6\u03cd\u03bc\u03b7\u03c2 \u03c3\u03c4\u03b7\u03bd \u0395\u03bb\u03bb\u03ac\u03b4\u03b1 \u03ba\u03b1\u03b9 \u03bc\u03b9\u03b1 \u03b1\u03c0\u03cc \u03c4\u03b9\u03c2 \u03bc\u03b5\u03b3\u03b1\u03bb\u03cd\u03c4\u03b5\u03c1\u03b5\u03c2 \u03c3\u03c4\u03b7\u03bd \u0395\u03c5\u03c1\u03ce\u03c0\u03b7. \u0393\u03b9\u03b1 \u03c0\u03b5\u03c1\u0 \u03bf\u03ad\u03bc\u03b2\u03c1\u03b9\u03bf\u03c2 2013) \u03ba\u03b1\u03b9 \u03c3\u03c4\u03bf \u03a7\u03c1\u03b7\u03bc\u03b1\u03c4\u03b9\u03c3\u03c4\u03ae\u03c1\u03b9\u03bf \u0391\u03b8\u03b7\u03bd\u03ce\u03bd (\u03a6\u03b5\u03b2\u03c1\u03bf\u03c5\u03ac\u03c1\u03b9\u03bf\u03c2 2014).,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u03a0\u03bf\u03bb\u03b5\u03bc\u03b9\u03ba\u03ae \u0392\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1|\u0392\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1|\u039c\u03ad\u03c4\u03b1\u03bb\u03bb\u03bf,\n            \u039a\u03ad\u03c1\u03b4\u03b7: \u039f\u03b9 \u03b5\u03c4\u03b1\u03b9\u03c1\u03af\u03b5\u03c2 \u03c4\u03b7\u03c2 Viohalco \u03b4\u03b7\u03bc\u03b9\u03bf\u03c5\u03c1\u03b3\u03bf\u03cd\u03bd \u03b5\u03c4\u03ae\u03c3\u03b9\u03bf \u03ba\u03cd\u03ba\u03bb\u03bf \u03b5\u03c1\u03b3\u03b1\u03c3\u03b9\u03ce\u03bd 6,6 \u03b4\u03b9\u03c3. \u03b5\u03c5\u03c1\u03ce (2024), \u03b4\u03b9\u03b1\u03b8\u03ad\u03c4\u03bf\u03bd\u03c4\u03b1\u03c2 \u03ba\u03cd\u03c1\u03b9\u03b5\u03c2 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03b9\u03ba\u03ad\u03c2 \u03b5\u03b3\u03ba\u03b1\u03c4\u03b1\u03c3\u03c4\u03ac\u03c3\u03b5\u03b9\u03c2 \u03c3\u03b5 8 \u03c7\u03ce\u03c1\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03c0\u03c9\u03bb\u03ae\u03c3\u03b5\u03b9\u03c2 \u03c3\u03b5 \u03c0\u03b5\u03c1\u03af\u03c0\u03bf\u03c5 100 \u03c7\u03ce\u03c1\u03b5\u03c2\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            \u0397 Viohalco S.A. \u03b5\u03af\u03bd\u03b1\u03b9 \u03b5\u03c4\u03b1\u03b9\u03c1\u03af\u03b1 \u03c3\u03c5\u03bc\u03bc\u03b5\u03c4\u03bf\u03c7\u03ce\u03bd (holding) \u03c3\u03b5 \u03ba\u03bf\u03c1\u03c5\u03c6\u03b1\u03af\u03b5\u03c2 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03b9\u03ba\u03ad\u03c2 \u03b5\u03c4\u03b1\u03b9\u03c1\u03af\u03b5\u03c2 \u03b5\u03c0\u03b5\u03be\u03b5\u03c1\u03b3\u03b1\u03c3\u03af\u03b1\u03c2 \u03bc\u03b5\u03c4\u03ac\u03bb\u03bb\u03c9\u03bd \u03c3\u03c4\u03b7\u03bd \u0395\u03c5\u03c1\u03ce\u03c0\u03b7. \u039c\u03b5 \u03ad\u03b4\u03c1\u03b1 \u03c3\u03c4\u03bf \u0392\u03ad\u03bb\u03b3\u03b9\u03bf \u03b5\u03af\u03bd\u03b1\u03b9 \u03b5\u03b9\u03c3\u03b7\u03b3\u03bc\u03ad\u03bd\u03b7 \u03c3\u03c4\u03bf \u03a7\u03c1\u03b7\u03bc\u03b1\u03c4\u03b9\u03c3\u03c4\u03ae\u03c1\u03b9\u03bf Euronext \u0392\u03c1\u03c5\u03be\u03b5\u03bb\u03bb\u03ce\u03bd (\u039d\u03bf\u03ad\u03bc\u03b2\u03c1\u03b9\u03bf\u03c2 2013) \u03ba\u03b1\u03b9 \u03c3\u03c4\u03bf \u03a7\u03c1\u03b7\u03bc\u03b1\u03c4\u03b9\u03c3\u03c4\u03ae\u03c1\u03b9\u03bf \u0391\u03b8\u03b7\u03bd\u03ce\u03bd (\u03a6\u03b5\u03b2\u03c1\u03bf\u03c5\u03ac\u03c1\u03b9\u03bf\u03c2 2014).\n\u039f\u03b9 \u03b5\u03c4\u03b1\u03b9\u03c1\u03af\u03b5\u03c2 \u03c4\u03b7\u03c2 Viohalco \u03b4\u03b7\u03bc\u03b9\u03bf\u03c5\u03c1\u03b3\u03bf\u03cd\u03bd \u03b5\u03c4\u03ae\u03c3\u03b9\u03bf \u03ba\u03cd\u03ba\u03bb\u03bf \u03b5\u03c1\u03b3\u03b1\u03c3\u03b9\u03ce\u03bd 6,6 \u03b4\u03b9\u03c3. \u03b5\u03c5\u03c1\u03ce (2024), \u03b4\u03b9\u03b1\u03b8\u03ad\u03c4\u03bf\u03bd\u03c4\u03b1\u03c2 \u03ba\u03cd\u03c1\u03b9\u03b5\u03c2 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03b9\u03ba\u03ad\u03c2 ////\u03b5\u03b3\u03ba\u03b1\u03c4\u03b1\u03c3\u03c4\u03ac\u03c3\u03b5\u03b9\u03c2 \u03c3\u03b5 8 \u03c7\u03ce\u03c1\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03c0\u03c9\u03bb\u03ae\u03c3\u03b5\u03b9\u03c2 \u03c3\u03b5 \u03c0\u03b5\u03c1\u03af\u03c0\u03bf\u03c5 100 \u03c7\u03ce\u03c1\u03b5\u03c2\n****\n\u0399\u03b4\u03b9\u03b1\u03af\u03c4\u03b5\u03c1\u03bf \u03b5\u03bd\u03b4\u03b9\u03b1\u03c6\u03ad\u03c1\u03bf\u03bd \u03ad\u03c7\u03b5\u03b9 \u03c4\u03bf \"\u03b5\u03c1\u03b5\u03c5\u03bd\u03b7\u03c4\u03b9\u03ba\u03cc \u03ad\u03c1\u03b3\u03bf\": \u03b2\u03bb\u03ad\u03c0\u03b5 https://www.viohalco.com/800/el/RandD-kai-texnologia/\n***\n\ud83d\udd29 1. \u039c\u03b5\u03c4\u03b1\u03bb\u03bb\u03bf\u03c5\u03c1\u03b3\u03af\u03b1 \u2013 \u03a7\u03b1\u03bb\u03ba\u03cc\u03c2 \u03ba\u03b1\u03b9 \u039a\u03c1\u03ac\u03bc\u03b1\u03c4\u03b1\nElvalHalcor S.A. \u2013 \u039c\u03af\u03b1 \u03b1\u03c0\u03cc \u03c4\u03b9\u03c2 \u03bc\u03b5\u03b3\u03b1\u03bb\u03cd\u03c4\u03b5\u03c1\u03b5\u03c2 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b5\u03c2 \u03ad\u03bb\u03b1\u03c3\u03b7\u03c2 \u03b1\u03bb\u03bf\u03c5\u03bc\u03b9\u03bd\u03af\u03bf\u03c5 \u03ba\u03b1\u03b9 \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03c3\u03c4\u03b7\u03bd \u0395\u03c5\u03c1\u03ce\u03c0\u03b7.\n\n\u03a0\u03b5\u03c1\u03b9\u03bb\u03b1\u03bc\u03b2\u03ac\u03bd\u03b5\u03b9 \u03bc\u03bf\u03bd\u03ac\u03b4\u03b5\u03c2 \u03cc\u03c0\u03c9\u03c2:\n\nElval (\u03b1\u03bb\u03bf\u03c5\u03bc\u03af\u03bd\u03b9\u03bf)\n\nHalcor (\u03c7\u03b1\u03bb\u03ba\u03cc\u03c2 \u0026 \u03c3\u03c9\u03bb\u03ae\u03bd\u03b5\u03c2 \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd)\n\nFitco\n\nSofia Med (\u0392\u03bf\u03c5\u03bb\u03b3\u03b1\u03c1\u03af\u03b1)\n\n\ud83d\udd0c 2. \u0395\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1 \u0026 \u03a4\u03b7\u03bb\u03b5\u03c0\u03b9\u03ba\u03bf\u03b9\u03bd\u03c9\u03bd\u03af\u03b5\u03c2 (\u03bc\u03ad\u03c3\u03c9 \u03c4\u03b7\u03c2 Cenergy Holdings)\nCenergy Holdings S.A.\n\nHellenic Cables S.A. \u2013 \u039a\u03b1\u03bb\u03ce\u03b4\u03b9\u03b1 \u03c5\u03c8\u03b7\u03bb\u03ae\u03c2 \u03ba\u03b1\u03b9 \u03c5\u03c0\u03b5\u03c1\u03c5\u03c8\u03b7\u03bb\u03ae\u03c2 \u03c4\u03ac\u03c3\u03b7\u03c2, \u03c5\u03c0\u03bf\u03b2\u03c1\u03cd\u03c7\u03b9\u03b1 \u03ba\u03b1\u03bb\u03ce\u03b4\u03b9\u03b1.\n\nCorinth Pipeworks S.A. \u2013 \u0392\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1 \u03c3\u03c9\u03bb\u03ae\u03bd\u03c9\u03bd \u03b3\u03b9\u03b1 \u03c0\u03b5\u03c4\u03c1\u03ad\u03bb\u03b1\u03b9\u03bf, \u03c6\u03c5\u03c3\u03b9\u03ba\u03cc \u03b1\u03ad\u03c1\u03b9\u03bf \u03ba\u03b1\u03b9 \u03b1\u03b3\u03c9\u03b3\u03bf\u03cd\u03c2.\n\n\ud83c\udfd7\ufe0f 3. \u03a7\u03ac\u03bb\u03c5\u03b2\u03b1\u03c2 \u0026 \u039a\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ad\u03c2\nSidenor S.A. \u2013 \u0395\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u0 4\u03b5\u03c2\nMetal Agencies (\u0397\u03bd\u03c9\u03bc\u03ad\u03bd\u03bf \u0392\u03b1\u03c3\u03af\u03bb\u03b5\u03b9\u03bf) \u2013 \u0395\u03bc\u03c0\u03bf\u03c1\u03af\u03b1 \u03bc\u03b5\u03c4\u03ac\u03bb\u03bb\u03c9\u03bd\n            "}, {"color": "#ff7f0e", "id": "\u039c\u03ad\u03c4\u03b1\u03bb\u03bb\u03bf", "label": "\u039c\u03ad\u03c4\u03b1\u03bb\u03bb\u03bf", "shape": "box"}, {"color": "#1f77b4", "id": "Cenergy Holdings", "label": "Cenergy Holdings", "shape": "dot", "title": "\n            Cenergy Holdings,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u03bc\u03b5\u03c4\u03b1\u03c6\u03bf\u03c1\u03ac\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2, \u03b1\u03bd\u03b1\u03bd\u03b5\u03ce\u03c3\u03b9\u03bc\u03c9\u03bd \u03c0\u03b7\u03b3\u03ce\u03bd \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03bc\u03b5\u03c4\u03ac\u03b4\u03bf\u03c3\u03b7\u03c2 \u03b4\u03b5\u03b4\u03bf\u03bc\u03ad\u03bd\u03c9\u03bd,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u0395\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1|\u039c\u03ad\u03c4\u03b1\u03bb\u03bb\u03bf|\u0392\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1|\u03a4\u03b7\u03bb\u03b5\u03c0\u03b9\u03ba\u03bf\u03b9\u03bd\u03c9\u03bd\u03af\u03b5\u03c2,\n            \u039a\u03ad\u03c1\u03b4\u03b7: None\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            \u0397 Cenergy Holdings \u03b5\u03af\u03bd\u03b1\u03b9 \u03bc\u03b9\u03b1 \u0392\u03b5\u03bb\u03b3\u03b9\u03ba\u03ae \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03c3\u03c5\u03bc\u03bc\u03b5\u03c4\u03bf\u03c7\u03ce\u03bd \u03b5\u03b9\u03c3\u03b7\u03b3\u03bc\u03ad\u03bd\u03b7 \u03c4\u03cc\u03c3\u03bf \u03c3\u03c4\u03bf \u03a7\u03c1\u03b7\u03bc\u03b1\u03c4\u03b9\u03c3\u03c4\u03ae\u03c1\u03b9\u03bf \u03c4\u03c9\u03bd \u0392\u03c1\u03c5\u03be\u03b5\u03bb\u03bb\u03ce\u03bd \u03cc\u03c3\u03bf \u03ba\u03b1\u03b9 \u03c3\u03c4\u03bf \u03a7\u03c1\u03b7\u03bc\u03b1\u03c4\ \u03ba\u03b1\u03b9 \u03b5\u03af\u03bd\u03b1\u03b9 \u03b5\u03b9\u03c3\u03b7\u03b3\u03bc\u03ad\u03bd\u03b7 \u03c3\u03c4\u03bf Euronext Brussels \u03ba\u03b1\u03b9 \u03c3\u03c4\u03bf \u03a7\u03c1\u03b7\u03bc\u03b1\u03c4\u03b9\u03c3\u03c4\u03ae\u03c1\u03b9\u03bf \u0391\u03b8\u03b7\u03bd\u03ce\u03bd (Athex). \u0397 \u0395\u03c4\u03b1\u03b9\u03c1\u03af\u03b1 \u03b5\u03c3\u03c4\u03b9\u03ac\u03b6\u03b5\u03b9 \u03c3\u03c4\u03b7 \u03bc\u03b1\u03ba\u03c1\u03bf\u03c0\u03c1\u03cc\u03b8\u03b5\u03c3\u03bc\u03b7 \u03b4\u03b7\u03bc\u03b9\u03bf\u03c5\u03c1\u03b3\u03af\u03b1 \u03c0\u03c1\u03bf\u03c3\u03c4\u03b9\u03b8\u03ad\u03bc\u03b5\u03bd\u03b7\u03c2 \u03b1\u03be\u03af\u03b1\u03c2, \u03b5\u03c0\u03b5\u03bd\u03b4\u03cd\u03b5\u03b9 \u03c3\u03b5 \u03ba\u03bf\u03c1\u03c5\u03c6\u03b1\u03af\u03b5\u03c2 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03b9\u03ba\u03ad\u03c2 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03b5\u03c3\u03c4\u03b9\u03ac\u03b6\u03b5\u03b9 \u03c3\u03c4\u03b7\u03bd \u03b1\u03c5\u03be\u03b1\u03bd\u03cc\u03bc\u03b5\u03bd\u03b7 \u03c0\u03b1\u03b3\u03ba\u03cc\u03c3\u03bc\u03b9\u03b1 \u03b6\u03ae\u03c4\u03b7\u03c3\u03b7 \u03b3\u03b9\u03b1 \u03bc\u03b5\u03c4\u03b1\u03c6\u03bf\u03c1\u03ac \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2, \u03b1\u03bd\u03b1\u03bd\u03b5\u03ce\u03c3\u03b9\u03bc\u03b5\u03c2 \u03c0\u03b7\u03b3\u03ad\u03c2 \u03ba\u03b1\u03b9 \u03bc\u03b5\u03c4\u03b1\u03c6\u03bf\u03c1\u03ac \u03b4\u03b5\u03b4\u03bf\u03bc\u03ad\u03bd\u03c9\u03bd.\n\n\u0397 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03b5\u03c0\u03b5\u03bd\u03b4\u03cd\u03b5\u03b9 \u03c3\u03b5 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03b9\u03ba\u03ad\u03c2 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b5\u03c2 \u03c0\u03bf\u03c5 \u03b4\u03c1\u03b1\u03c3\u03c4\u03b7\u03c1\u03b9\u03bf\u03c0\u03bf\u03b9\u03bf\u03cd\u03bd\u03c4\u03b1\u03b9 \u03c3\u03b5 \u03b4\u03c5\u03bd\u03b1\u03bc\u03b9\u03ba\u03ad\u03c2 \u03ba\u03b1\u03b9 \u03b1\u03bd\u03b1\u03c0\u03c4\u03c5\u03c3\u03c3\u03cc\u03bc\u03b5\u03bd\u03b5\u03c2 \u03b1\u03b3\u03bf\u03c1\u03ad\u03c2 \u03cc\u03c0\u03c9\u03c2 \u03b1\u03c5\u03c4\u03ad\u03c2 \u03c4\u03b7\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03c4\u03c9\u03bd \u03c4\u03b7\u03bb\u03b5\u03c0\u03b9\u03ba\u03bf\u03b9\u03bd\u03c9\u03bd\u03b9\u03ce\u03bd.\n\n\u0397 Cenergy Holdings \u03b5\u03af\u03bd\u03b1\u03b9 \u03b8\u03c5\u03b3\u03b1\u03c4\u03c1\u03b9\u03ba\u03ae \u03c4\u03b7\u03c2 Viohalco S.A., \u03bc\u03b9\u03b1\u03c2 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1\u03c2 \u03c7\u03b1\u03c1\u03c4\u03bf\u03c6\u03c5\u03bb\u03b1\u03ba\u03af\u03bf\u03c5 \u03ba\u03bf\u03c1\u03c5\u03c6\u03b1\u03af\u03c9\u03bd \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03b9\u03ce\u03bd \u03b5\u03c0\u03b5\u03be\u03b5\u03c1\u03b3\u03b1\u03c3\u03af\u03b1\u03c2 \u03bc\u03b5\u03c4\u03ac\u03bb\u03bb\u03c9\u03bd \u03c3\u03b5 \u03cc\u03bb\u03b7 \u03c4\u03b7\u03bd \u0395\u03c5\u03c1\u03ce\u03c0\u03b7. \u039f\u03b9 \u03b8\u03c5\u03b3\u03b1\u03c4\u03c1\u03b9\u03ba\u03ad\u03c2 \u03c4\u03b7\u03c2 Viohalco \u03b5\u03b9\u03b4\u03b9\u03ba\u03b5\u03cd\u03bf\u03bd\u03c4\u03b1\u03b9 \u03c3\u03c4\u03b7\u03bd \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ae \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03b1\u03bb\u03bf\u03c5\u03bc\u03b9\u03bd\u03af\u03bf\u03c5, \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03ba\u03b1\u03b9 \u03c7\u03ac\u03bb\u03c5\u03b2\u03b1, \u03c3\u03c9\u03bb\u03ae\u03bd\u03c9\u03bd \u03c7\u03ac\u03bb\u03c5\u03b2\u03b1 \u03ba\u03b1\u03b9 \u03ba\u03b1\u03bb\u03c9\u03b4\u03af\u03c9\u03bd, \u03ba\u03b1\u03b8\u03ce\u03c2 \u03ba\u03b1\u03b9 \u03ac\u03bb\u03bb\u03c9\u03bd \u03c4\u03b5\u03c7\u03bd\u03bf\u03bb\u03bf\u03b3\u03b9\u03ba\u03ac \u03c0\u03c1\u03bf\u03b7\u03b3\u03bc\u03ad\u03bd\u03c9\u03bd \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03b9\u03ba\u03ce\u03bd \u03b5\u03c6\u03b1\u03c1\u03bc\u03bf\u03b3\u03ce\u03bd. \u0388\u03c7\u03bf\u03c5\u03bd \u03b5\u03b3\u03ba\u03b1\u03c4\u03b1\u03c3\u03c4\u03ac\u03c3\u03b5\u03b9\u03c2 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae\u03c2 \u03c3\u03b5 \u0395\u03bb\u03bb\u03ac\u03b4\u03b1, \u0392\u03bf\u03c5\u03bb\u03b3\u03b1\u03c1\u03af\u03b1, \u03a1\u03bf\u03c5\u03bc\u03b1\u03bd\u03af\u03b1, \u0397\u03bd\u03c9\u03bc\u03ad\u03bd\u03bf \u0392\u03b1\u03c3\u03af\u03bb\u03b5\u03b9\u03bf, \u0392\u03cc\u03c1\u03b5\u03b9\u03b1 \u039c\u03b1\u03ba\u03b5\u03b4\u03bf\u03bd\u03af\u03b1, \u03a1\u03c9\u03c3\u03af\u03b1 \u03ba\u03b1\u03b9 \u03a4\u03bf\u03c5\u03c1\u03ba\u03af\u03b1.\n            "}, {"color": "#1f77b4", "id": "\u03a3\u03c9\u03bb\u03b7\u03bd\u03bf\u03c5\u03c1\u03b3\u03b5\u03af\u03b1 \u039a\u03bf\u03c1\u03af\u03bd\u03b8\u03bf\u03c5", "label": "\u03a3\u03c9\u03bb\u03b7\u03bd\u03bf\u03c5\u03c1\u03b3\u03b5\u03af\u03b1 \u039a\u03bf\u03c1\u03af\u03bd\u03b8\u03bf\u03c5", "shape": "dot", "title": "\n            \u03a3\u03c9\u03bb\u03b7\u03bd\u03bf\u03c5\u03c1\u03b3\u03b5\u03af\u03b1 \u039a\u03bf\u03c1\u03af\u03bd\u03b8\u03bf\u03c5,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u0397 \u03a3\u03c9\u03bb\u03b7\u03bd\u03bf\u03c5\u03c1\u03b3\u03b5\u03af\u03b1 \u039a\u03bf\u03c1\u03af\u03bd\u03b8\u03bf\u03c5 \u03b5\u03af\u03bd\u03b1\u03b9 \u03c0\u03b1\u03b3\u03ba\u03cc\u03c3\u03bc\u03b9\u03bf\u03c2 \u03b7\u03b3\u03ad\u03c4\u03b7\u03c2 \u03c3\u03c4\u03b7\u03bd \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ae \u03c3\u03c9\u03bb\u03ae\u03bd\u03c9\u03bd \u03c7\u03ac\u03bb\u03c5\u03b2\u03b1 \u03b3\u03b9\u03b1 \u03c4\u03bf\u03bd \u03ba\u03bb\u03ac\u03b4\u03bf \u03c4\u03b7\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03c3\u03b7\u03bc\u03b1\u03bd\u03c4\u03b9\u03ba\u03cc\u03c2 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03cc\u03c2 \u03ba\u03bf\u03b9\u03bb\u03bf\u03b4\u03bf\u03ba\u03ce\u03bd \u03c7\u03ac\u03bb\u03c5\u03b2\u03b1 \u03b3\u03b9\u03b1 \u03c4\u03bf\u03bd \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03b1\u03c3\u03c4\u03b9\u03ba\u03cc \u03ba\u03bb\u03ac\u03b4\u03bf.,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u039c\u03ad\u03c4\u03b1\u03bb\u03bb\u03bf|\u03a0\u03bf\u03bb\u03b5\u03bc\u03b9\u03ba\u03ae \u0392\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1,\n            \u039a\u03ad\u03c1\u03b4\u03b7: \u0395\u03c0\u03b5\u03bd\u03b4\u03cd\u03c3\u03b5\u03b9\u03c2 250 \u03b5\u03ba\u03b1\u03c4\u03bf\u03bc\u03bc\u03cd\u03c1\u03b9\u03b1 \u03b5\u03c5\u03c1\u03ce \u03b1\u03c0\u03cc \u03c4\u03bf 2012|\u03c0\u03ac\u03bd\u03c9 \u03b1\u03c0\u03cc 750 \u03b5\u03c1\u03b3\u03b1\u03b6\u03cc\u03bc\u03b5\u03bd\u03bf\u03c5\u03c2|63 \u03b5\u03ba\u03b1\u03c4\u03bf\u03bc\u03bc\u03cd\u03c1\u03b9\u03b1 \u03ba\u03ad\u03c1\u03b4\u03b7 \u03c4\u03bf 2024 \u03c0\u03c1\u03bf \u03c6\u03cc\u03c1\u03c9\u03bd\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            \u0397 \u03a3\u03c9\u03bb\u03b7\u03bd\u03bf\u03c5\u03c1\u03b3\u03b5\u03af\u03b1 \u039a\u03bf\u03c1\u03af\u03bd\u03b8\u03bf\u03c5 \u03b5\u03af\u03bd\u03b1\u03b9 \u03ad\u03bd\u03b1\u03c2 \u03b1\u03c0\u03cc \u03c4\u03bf\u03c5\u03c2 \u03ba\u03bf\u03c1\u03c5\u03c6\u03b1\u03af\u03bf\u03c5\u03c2 \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03b1\u03c3\u03c4\u03ad\u03c2 \u03c3\u03c9\u03bb\u03ae\u03bd\u03c9\u03bd \u03c7\u03ac\u03bb\u03c5\u03b2\u03b1 \u03ba\u03b1\u03b9 \u03ba\u03bf\u03af\u03bb\u03c9\u03bd \u03b4\u03bf\u03ba\u03ce\u03bd, \u03c0\u03b1\u03b3\u03ba\u03bf\u03c3\u03bc\u03af\u03c9\u03c2, \u03b3\u03b9\u03b1 \u03c4\u03bf\u03c5\u03c2 \u03c4\u03bf\u03bc\u03b5\u03af\u03c2 \u03c4\u03b7\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03c4\u03c9\u03bd \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ce\u03bd. \u039c\u03b5 \u03bc\u03b9\u03b1 \u03b5\u03c0\u03b9\u03c4\u03c5\u03c7\u03b7\u03bc\u03ad\u03bd\u03b7 \u03c0\u03bf\u03c1\u03b5\u03af\u03b1 \u03ba\u03b1\u03b9 \u03b5\u03bc\u03c0\u03b5\u03b9\u03c1\u03af\u03b1 \u03c0\u03ac\u03bd\u03c9 \u03b1\u03c0\u03cc \u03bc\u03b9\u03c3\u03cc \u03b1\u03b9\u03ce\u03bd\u03b1, \u03ad\u03c7\u03b5\u03b9 \u03c5\u03bb\u03bf\u03c0\u03bf\u03b9\u03ae\u03c3\u03b5\u03b9 \u03c0\u03bf\u03bb\u03cd \u03b1\u03c0\u03b1\u03b9\u03c4\u03b7\u03c4\u03b9\u03ba\u03ac \u03ad\u03c1\u03b3\u03b1 \u03bc\u03b5 \u03ba\u03bf\u03c1\u03c5\u03c6\u03b1\u03af\u03b5\u03c2 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b5\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2 \u03c0\u03b1\u03b3\u03ba\u03bf\u03c3\u03bc\u03af\u03c9\u03c2.\n\u039f\u03b9 \u03c3\u03c9\u03bb\u03ae\u03bd\u03b5\u03c2 \u03c7\u03ac\u03bb\u03c5\u03b2\u03b1 \u03c0\u03bf\u03c5 \u03ad\u03c7\u03b5\u03b9 \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ac\u03c3\u03b5\u03b9 \u03b7 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1, \u03c4\u03b1 \u03c4\u03b5\u03bb\u03b5\u03c5\u03c4\u03b1\u03af\u03b1 15 \u03c7\u03c1\u03cc\u03bd\u03b9\u03b1, \u03bc\u03c0\u03bf\u03c1\u03bf\u03cd\u03bd \u03bd\u03b1 \u03ba\u03b1\u03bb\u03cd\u03c8\u03bf\u03c5\u03bd \u03c0\u03b5\u03c1\u03b9\u03c3\u03c3\u03cc\u03c4\u03b5\u03c1\u03bf \u03b1\u03c0\u03cc \u03c4\u03bf \u03bc\u03b9\u03c3\u03cc \u03c0\u03b5\u03c1\u03af\u03bc\u03b5\u03c4\u03c1\u03bf \u03c4\u03b7\u03c2 \u0393\u03b7\u03c2.\n\u039c\u03b5 \u03b5\u03bc\u03c0\u03b5\u03b9\u03c1\u03af\u03b1 \u03c0\u03ac\u03bd\u03c9 \u03b1\u03c0\u03cc \u03bc\u03b9\u03c3\u03cc \u03b1\u03b9\u03ce\u03bd\u03b1, \u03b7 \u03a3\u03c9\u03bb\u03b7\u03bd\u03bf\u03c5\u03c1\u03b3\u03b5\u03af\u03b1 \u039a\u03bf\u03c1\u03af\u03bd\u03b8\u03bf\u03c5 \u03ad\u03c7\u03b5\u03b9 \u03c3\u03c5\u03bd\u03b5\u03c1\u03b3\u03b1\u03c3\u03c4\u03b5\u03af \u03bc\u03b5 \u03bc\u03b5\u03b3\u03ac\u03bb\u03b5\u03c2 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b5\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2 \u03c3\u03b5 \u03cc\u03bb\u03bf \u03c4\u03bf\u03bd \u03ba\u03cc\u03c3\u03bc\u03bf, \u03c3\u03b5 \u03b5\u03be\u03b1\u03b9\u03c1\u03b5\u03c4\u03b9\u03ba\u03ac \u03b1\u03c0\u03b1\u03b9\u03c4\u03b7\u03c4\u03b9\u03ba\u03ac \u03ad\u03c1\u03b3\u03b1. \u0397 \u03c0\u03b5\u03bb\u03b1\u03c4\u03bf\u03ba\u03b5\u03bd\u03c4\u03c1\u03b9\u03ba\u03ae \u03c6\u03b9\u03bb\u03bf\u03c3\u03bf\u03c6\u03af\u03b1 \u03c4\u03b7\u03c2 \u0395\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1\u03c2 \u03ad\u03c7\u03b5\u03b9 \u03b5\u03c0\u03b9\u03c6\u03ad\u03c1\u03b5\u03b9 \u03b9\u03c3\u03c7\u03c5\u03c1\u03ad\u03c2, \u03bc\u03b1\u03ba\u03c1\u03bf\u03c0\u03c1\u03cc\u03b8\u03b5\u03c3\u03bc\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03b1\u03bc\u03bf\u03b9\u03b2\u03b1\u03af\u03b1 \u03b5\u03c0\u03c9\u03c6\u03b5\u03bb\u03b5\u03af\u03c2 \u03c3\u03c7\u03ad\u03c3\u03b5\u03b9\u03c2, \u03b5\u03bd\u03b9\u03c3\u03c7\u03cd\u03bf\u03bd\u03c4\u03b1\u03c2 \u03c4\u03b7 \u03b3\u03b5\u03c9\u03b3\u03c1\u03b1\u03c6\u03b9\u03ba\u03ae \u03c4\u03b7\u03c2 \u03c0\u03b1\u03c1\u03bf\u03c5\u03c3\u03af\u03b1.\n\u0397 \u0395\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ac\u03b6\u03b5\u03b9 \u03bc\u03af\u03b1 \u03b1\u03c0\u03cc \u03c4\u03b9\u03c2 \u03c0\u03b9\u03bf \u03bf\u03bb\u03bf\u03ba\u03bb\u03b7\u03c1\u03c9\u03bc\u03ad\u03bd\u03b5\u03c2 \u03b3\u03ba\u03ac\u03bc\u03b5\u03c2 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03c0\u03b1\u03b3\u03ba\u03bf\u03c3\u03bc\u03af\u03c9\u03c2 \u03ba\u03b1\u03b9 \u03c0\u03c1\u03bf\u03c3\u03c6\u03ad\u03c1\u03b5\u03b9 \u03bf\u03bb\u03bf\u03ba\u03bb\u03b7\u03c1\u03c9\u03bc\u03ad\u03bd\u03b5\u03c2 \u03bb\u03cd\u03c3\u03b5\u03b9\u03c2, \u03bf\u03b9 \u03bf\u03c0\u03bf\u03af\u03b5\u03c2 \u03b2\u03b1\u03c3\u03af\u03b6\u03bf\u03bd\u03c4\u03b1\u03b9 \u03c3\u03b5 \u03b5\u03c0\u03b5\u03bd\u03b4\u03cd\u03c3\u03b5\u03b9\u03c2 \u03c3\u03b5 \u03bd\u03ad\u03b5\u03c2 \u03c4\u03b5\u03c7\u03bd\u03bf\u03bb\u03bf\u03b3\u03af\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03c3\u03c4\u03b7 \u03c3\u03c5\u03bd\u03b5\u03c7\u03ae \u03b2\u03b5\u03bb\u03c4\u03af\u03c9\u03c3\u03b7 \u03c4\u03c9\u03bd \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03b9\u03ba\u03ce\u03bd \u03b4\u03b9\u03b1\u03b4\u03b9\u03ba\u03b1\u03c3\u03b9\u03ce\u03bd \u03c4\u03b7\u03c2. \u039f\u03b9 \u03c0\u03b5\u03bb\u03ac\u03c4\u03b5\u03c2 \u03be\u03b5\u03c7\u03c9\u03c1\u03af\u03b6\u03bf\u03c5\u03bd \u03c4\u03b7 \u03a3\u03c9\u03bb\u03b7\u03bd\u03bf\u03c5\u03c1\u03b3\u03b5\u03af\u03b1 \u039a\u03bf\u03c1\u03af\u03bd\u03b8\u03bf\u03c5, \u03b3\u03b9\u03b1 \u03c4\u03b7\u03bd \u03c4\u03b5\u03c7\u03bd\u03bf\u03bb\u03bf\u03b3\u03b9\u03ba\u03ae \u03c5\u03c0\u03b5\u03c1\u03bf\u03c7\u03ae, \u03c4\u03b7\u03bd \u03b5\u03c5\u03b5\u03bb\u03b9\u03be\u03af\u03b1, \u03c4\u03b7\u03bd \u03c0\u03b1\u03c1\u03bf\u03c7\u03ae \u03bf\u03b9\u03ba\u03bf\u03bd\u03bf\u03bc\u03b9\u03ba\u03ac \u03b2\u03ad\u03bb\u03c4\u03b9\u03c3\u03c4\u03c9\u03bd \u03bb\u03cd\u03c3\u03b5\u03c9\u03bd \u03ba\u03b1\u03b9 \u03c4\u03b7 \u03c3\u03c5\u03bd\u03bf\u03bb\u03b9\u03ba\u03ac \u03c5\u03c8\u03b7\u03bb\u03ae \u03b1\u03c0\u03cc\u03b4\u03bf\u03c3\u03ae \u03c4\u03b7\u03c2, \u03cc\u03c0\u03c9\u03c2 \u03b5\u03c0\u03b9\u03b2\u03b5\u03b2\u03b1\u03b9\u03ce\u03bd\u03b5\u03c4\u03b1\u03b9 \u03ba\u03ac\u03b8\u03b5 \u03c7\u03c1\u03cc\u03bd\u03bf \u03b1\u03c0\u03cc \u03c4\u03bf\u03c5\u03c2 \u03b4\u03b5\u03af\u03ba\u03c4\u03b5\u03c2 \u03b9\u03ba\u03b1\u03bd\u03bf\u03c0\u03bf\u03af\u03b7\u03c3\u03b7\u03c2 \u03c4\u03c9\u03bd \u03c0\u03b5\u03bb\u03b1\u03c4\u03ce\u03bd. \n////\n\u03a5\u03c0\u03bf\u03b8\u03b1\u03bb\u03ac\u03c3\u03c3\u03b9\u03bf\u03b9 \u03b1\u03b3\u03c9\u03b3\u03bf\u03af \u03bc\u03b5\u03b3\u03ac\u03bb\u03bf\u03c5 \u03b2\u03ac\u03b8\u03bf\u03c5\u03c2 \u03c5\u03c8\u03b7\u03bb\u03ce\u03bd \u03c0\u03c1\u03bf\u03b4\u03b9\u03b1\u03b3\u03c1\u03b1\u03c6\u03ce\u03bd\n\n\u0391\u03c0\u03b1\u03b9\u03c4\u03b7\u03c4\u03b9\u03ba\u03bf\u03af \u03c7\u03b5\u03c1\u03c3\u03b1\u03af\u03bf\u03b9 \u03b1\u03b3\u03c9\u03b3\u03bf\u03af \u03bc\u03b5\u03c4\u03b1\u03c6\u03bf\u03c1\u03ac\u03c2 \u03c6\u03c5\u03c3\u03b9\u03ba\u03bf\u03cd \u03b1\u03b5\u03c1\u03af\u03bf\u03c5\n\n\u03a3\u03c9\u03bb\u03ae\u03bd\u03b5\u03c2 \u03bc\u03b5\u03c4\u03b1\u03c6\u03bf\u03c1\u03ac\u03c2 \u03c5\u03b4\u03c1\u03bf\u03b3\u03cc\u03bd\u03bf\u03c5\n\n\u0395\u03be\u03b5\u03b9\u03b4\u03b9\u03ba\u03b5\u03c5\u03bc\u03ad\u03bd\u03b5\u03c2 \u03ba\u03bf\u03af\u03bb\u03b5\u03c2 \u03b4\u03b9\u03b1\u03c4\u03bf\u03bc\u03ad\u03c2 \u03c7\u03ac\u03bb\u03c5\u03b2\u03b1 \u03b5\u03b9\u03b4\u03b9\u03ba\u03ce\u03bd \u03c0\u03c1\u03bf\u03b4\u03b9\u03b1\u03b3\u03c1\u03b1\u03c6\u03ce\u03bd\n            "}, {"color": "#1f77b4", "id": "Hellenic Cables", "label": "Hellenic Cables", "shape": "dot", "title": "\n            Hellenic Cables,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u039a\u03b1\u03bb\u03ce\u03b4\u03b9\u03b1,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u0395\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1|\u03a4\u03b7\u03bb\u03b5\u03c0\u03b9\u03ba\u03bf\u03b9\u03bd\u03c9\u03bd\u03af\u03b5\u03c2,\n            \u039a\u03ad\u03c1\u03b4\u03b7: 494 E\u03ba\u03b1\u03c4. \u03b5\u03c5\u03c1\u03ce \u03c3\u03b5 \u03b5\u03c0\u03b5\u03bd\u03b4\u03cd\u03c3\u03b5\u03b9\u03c2 \u03c4\u03b1 \u03c4\u03b5\u03bb\u03b5\u03c5\u03c4\u03b1\u03af\u03b1 \u03c0\u03ad\u03bd\u03c4\u03b5 \u03c7\u03c1\u03cc\u03bd\u03b9\u03b1|5 E\u03c1\u03b3\u03bf\u03c3\u03c4\u03ac\u03c3\u03b9\u03b1 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae\u03c2 \u03ba\u03b1\u03bb\u03c9\u03b4\u03af\u03c9\u03bd \u03c3\u03b5 3 \u03c7\u03ce\u03c1\u03b5\u03c2|\u003e2.850 E\u03c1\u03b3\u03b1\u03b6\u03cc\u03bc\u03b5\u03bd\u03bf\u03b9\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            \u039c\u03b5 70 \u03c7\u03c1\u03cc\u03bd\u03b9\u03b1 \u03b5\u03c0\u03b9\u03c4\u03c5\u03c7\u03b7\u03bc\u03ad\u03bd\u03b7\u03c2 \u03c0\u03bf\u03c1\u03b5\u03af\u03b1\u03c2 \u03c3\u03c4\u03b7\u03bd \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ae \u03ba\u03b1\u03bb\u03c9\u03b4\u03af\u03c9\u03bd, \u03b7 Hellenic Cables \u03b1\u03bd\u03b1\u03b3\u03bd\u03c9\u03c1\u03af\u03b6\u03b5\u03c4\u03b1\u03b9 \u03c3\u03ae\u03bc\u03b5\u03c1\u03b1 \u03c9\u03c2 \u03bc\u03af\u03b1 \u03b1\u03c0\u03cc \u03c4\u03b9\u03c2 \u03ba\u03bf\u03c1\u03c5\u03c6\u03b1\u03af\u03b5\u03c2 \u03b5\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b5\u03c2 \u03bc\u03b5\u03c4\u03b1\u03c6\u03bf\u03c1\u03ac\u03c2 \u03ba\u03b1\u03b9 \u03b4\u03b9\u03b1\u03bd\u03bf\u03bc\u03ae\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2 \u03c3\u03c4\u03b7\u03bd \u0395\u03c5\u03c1\u03ce\u03c0\u03b7, \u03b1\u03bd\u03b1\u03bd\u03b5\u03ce\u03c3\u03b9\u03bc\u03c9\u03bd \u03c0\u03b7\u03b3\u03ce\u03bd \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03c5\u03c0\u03b5\u03c1\u03ac\u03ba\u03c4\u03b9\u03c9\u03bd \u03b4\u03b9\u03ba\u03c4\u03cd\u03c9\u03bd \u03b1\u03b9\u03bf\u03bb\u03b9\u03ba\u03ae\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2, \u03b4\u03b9\u03ba\u03c4\u03cd\u03c9\u03bd \u03c4\u03b7\u03bb\u03b5\u03c0\u03b9\u03ba\u03bf\u03b9\u03bd\u03c9\u03bd\u03af\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03b4\u03b5\u03b4\u03bf\u03bc\u03ad\u03bd\u03c9\u03bd, \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ce\u03bd \u03ba\u03b1\u03b9 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1\u03c2.\n\n \n\n\u0397 \u0395\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 \u03b4\u03b9\u03b1\u03ba\u03c1\u03af\u03bd\u03b5\u03c4\u03b1\u03b9 \u03b3\u03b9\u03b1 \u03c4\u03bf\u03bd \u03ad\u03bd\u03c4\u03bf\u03bd\u03bf \u03b5\u03be\u03b1\u03b3\u03c9\u03b3\u03b9\u03ba\u03cc \u03c4\u03b7\u03c2 \u03c0\u03c1\u03bf\u03c3\u03b1\u03bd\u03b1\u03c4\u03bf\u03bb\u03b9\u03c3\u03bc\u03cc \u03ba\u03b1\u03b9 \u03c4\u03b7 \u03b4\u03b7\u03bc\u03b9\u03bf\u03c5\u03c1\u03b3\u03af\u03b1 \u03bc\u03b1\u03ba\u03c1\u03bf\u03c0\u03c1\u03cc\u03b8\u03b5\u03c3\u03bc\u03c9\u03bd \u03c3\u03c5\u03bd\u03b5\u03c1\u03b3\u03b1\u03c3\u03b9\u03ce\u03bd \u03ba\u03b1\u03b9 \u03b4\u03b5\u03c3\u03bc\u03ce\u03bd \u03bc\u03b5 \u03c3\u03b7\u03bc\u03b1\u03bd\u03c4\u03b9\u03ba\u03bf\u03cd\u03c2 \u03bf\u03c1\u03b3\u03b1\u03bd\u03b9\u03c3\u03bc\u03bf\u03cd\u03c2 \u03c3\u03c4\u03b7 \u0394\u03b1\u03bd\u03af\u03b1, \u03c4\u03b7 \u03a3\u03bf\u03c5\u03b7\u03b4\u03af\u03b1, \u03c4\u03bf \u0392\u03ad\u03bb\u03b3\u03b9\u03bf, \u03c4\u03b7 \u0393\u03b5\u03c1\u03bc\u03b1\u03bd\u03af\u03b1, \u03c4\u03b9\u03c2 \u039a\u03ac\u03c4\u03c9 \u03a7\u03ce\u03c1\u03b5\u03c2, \u03c4\u03bf\u03bd \u039a\u03b1\u03bd\u03b1\u03b4\u03ac \u03ba\u03b1\u03b9 \u03c4\u03bf \u0397\u03bd\u03c9\u03bc\u03ad\u03bd\u03bf \u0392\u03b1\u03c3\u03af\u03bb\u03b5\u03b9\u03bf. \u039a\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ac\u03b6\u03b5\u03b9 \u03ba\u03b1\u03bb\u03ce\u03b4\u03b9\u03b1 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03c4\u03b7\u03bb\u03b5\u03c0\u03b9\u03ba\u03bf\u03b9\u03bd\u03c9\u03bd\u03b9\u03ce\u03bd \u03b3\u03b9\u03b1 \u03b4\u03b9\u03ac\u03c6\u03bf\u03c1\u03bf\u03c5\u03c2 \u03c4\u03bf\u03bc\u03b5\u03af\u03c2 \u03cc\u03c0\u03c9\u03c2 \u03b7 \u03bc\u03b5\u03c4\u03b1\u03c6\u03bf\u03c1\u03ac \u03ba\u03b1\u03b9 \u03b4\u03b9\u03b1\u03bd\u03bf\u03bc\u03ae \u03b7\u03bb\u03b5\u03ba\u03c4\u03c1\u03b9\u03ba\u03ae\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2, \u03bf\u03b9 \u03b1\u03bd\u03b1\u03bd\u03b5\u03ce\u03c3\u03b9\u03bc\u03b5\u03c2 \u03c0\u03b7\u03b3\u03ad\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2, \u03b7 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1 \u03c0\u03b5\u03c4\u03c1\u03b5\u03bb\u03b1\u03af\u03bf\u03c5 \u03ba\u03b1\u03b9 \u03c6\u03c5\u03c3\u03b9\u03ba\u03bf\u03cd \u03b1\u03b5\u03c1\u03af\u03bf\u03c5, \u03bf\u03b9 \u03c4\u03b7\u03bb\u03b5\u03c0\u03b9\u03ba\u03bf\u03b9\u03bd\u03c9\u03bd\u03af\u03b5\u03c2, \u03bf\u03b9 \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ad\u03c2 \u03ba\u03b1\u03b9 \u03bf\u03b9 \u03c5\u03c0\u03bf\u03b4\u03bf\u03bc\u03ad\u03c2.\n\n \n\n\u039f\u03b9 \u03c4\u03b5\u03c7\u03bd\u03b9\u03ba\u03ad\u03c2 \u03b3\u03bd\u03ce\u03c3\u03b5\u03b9\u03c2 \u03c3\u03c5\u03bd\u03b4\u03c5\u03ac\u03b6\u03bf\u03bd\u03c4\u03b1\u03b9 \u03bc\u03b5 \u03c3\u03c5\u03bd\u03b5\u03c7\u03ae \u03b5\u03c0\u03ad\u03bd\u03b4\u03c5\u03c3\u03b7 \u03c3\u03b5 \u03c5\u03c0\u03b5\u03c1\u03c3\u03cd\u03b3\u03c7\u03c1\u03bf\u03bd\u03b1 \u03bc\u03b7\u03c7\u03b1\u03bd\u03ae\u03bc\u03b1\u03c4\u03b1 \u03b3\u03b9\u03b1 \u03bd\u03b1 \u03b4\u03b9\u03b1\u03c3\u03c6\u03b1\u03bb\u03b9\u03c3\u03c4\u03b5\u03af \u03cc\u03c4\u03b9 \u03c4\u03b1 \u03b5\u03c0\u03af\u03c0\u03b5\u03b4\u03b1 \u03b1\u03c0\u03cc\u03b4\u03bf\u03c3\u03b7\u03c2 \u03ba\u03b1\u03b9 \u03c0\u03bf\u03b9\u03cc\u03c4\u03b7\u03c4\u03b1\u03c2 \u03c0\u03bb\u03b7\u03c1\u03bf\u03cd\u03bd \u03c4\u03b1 \u03c5\u03c8\u03b7\u03bb\u03cc\u03c4\u03b5\u03c1\u03b1 \u03c0\u03c1\u03cc\u03c4\u03c5\u03c0\u03b1.\n\n \u0397 Hellenic Cables \u03b4\u03b9\u03b1\u03b8\u03ad\u03c4\u03b5\u03b9 \u03c4\u03ad\u03c3\u03c3\u03b5\u03c1\u03b1 \u03b5\u03c1\u03b3\u03bf\u03c3\u03c4\u03ac\u03c3\u03b9\u03b1 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae\u03c2 \u03ba\u03b1\u03bb\u03c9\u03b4\u03af\u03c9\u03bd \u03c3\u03c4\u03b7 \u0398\u03ae\u03b2\u03b1, \u03c4\u03bf\u03bd \u0395\u03bb\u03b5\u03ce\u03bd\u03b1 \u03ba\u03b1\u03b9 \u03c3\u03c4\u03b7\u03bd \u039a\u03cc\u03c1\u03b9\u03bd\u03b8\u03bf (\u0395\u03bb\u03bb\u03ac\u03b4\u03b1) \u03ba\u03b1\u03b9 \u03c3\u03c4\u03bf \u0392\u03bf\u03c5\u03ba\u03bf\u03c5\u03c1\u03ad\u03c3\u03c4\u03b9 (\u03a1\u03bf\u03c5\u03bc\u03b1\u03bd\u03af\u03b1), \u03ba\u03b1\u03b9 \u03b4\u03cd\u03bf \u03b2\u03bf\u03b7\u03b8\u03b7\u03c4\u03b9\u03ba\u03ac \u03b5\u03c1\u03b3\u03bf\u03c3\u03c4\u03ac\u03c3\u03b9\u03b1 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae\u03c2 \u03c3\u03c4\u03b1 \u039f\u03b9\u03bd\u03cc\u03c6\u03c5\u03c4\u03b1 (\u0395\u03bb\u03bb\u03ac\u03b4\u03b1) \u03c3\u03c4\u03bf Blagoevgrad (\u0392\u03bf\u03c5\u03bb\u03b3\u03b1\u03c1\u03af\u03b1). \u0397 \u03bc\u03bf\u03bd\u03ac\u03b4\u03b1 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae\u03c2 \u039a\u03bf\u03c1\u03af\u03bd\u03b8\u03bf\u03c5 \u03b5\u03af\u03bd\u03b1\u03b9 \u03ad\u03bd\u03b1 \u03b1\u03c0\u03cc \u03c4\u03b1 \u03bc\u03b5\u03b3\u03b1\u03bb\u03cd\u03c4\u03b5\u03c1\u03b1 \u03ba\u03b1\u03b9 \u03c0\u03b9\u03bf \u03c0\u03c1\u03bf\u03b7\u03b3\u03bc\u03ad\u03bd\u03b1 \u03b5\u03c1\u03b3\u03bf\u03c3\u03c4\u03ac\u03c3\u03b9\u03b1 \u03c5\u03c0\u03bf\u03b2\u03c1\u03c5\u03c7\u03af\u03c9\u03bd \u03ba\u03b1\u03bb\u03c9\u03b4\u03af\u03c9\u03bd \u03c3\u03c4\u03bf\u03bd \u03ba\u03cc\u03c3\u03bc\u03bf.\n\u0397 Hellenic Cables \u03b4\u03af\u03bd\u03b5\u03b9 \u03bc\u03b5\u03b3\u03ac\u03bb\u03b7 \u03ad\u03bc\u03c6\u03b1\u03c3\u03b7 \u03c3\u03c4\u03b7\u03bd \u03b1\u03bd\u03ac\u03c0\u03c4\u03c5\u03be\u03b7 \u03c4\u03c9\u03bd \u03b1\u03bd\u03b8\u03c1\u03ce\u03c0\u03c9\u03bd \u03c4\u03b7\u03c2 \u03ba\u03b1\u03b9 \u03c3\u03c4\u03b7 \u03b4\u03b7\u03bc\u03b9\u03bf\u03c5\u03c1\u03b3\u03af\u03b1 \u03b1\u03be\u03af\u03b1\u03c2 \u03b3\u03b9\u03b1 \u03c4\u03bf\u03c5\u03c2 \u03c3\u03c5\u03bc\u03bc\u03b5\u03c4\u03cc\u03c7\u03bf\u03c5\u03c2, \u03c4\u03bf\u03c5\u03c2 \u03c3\u03c5\u03bd\u03b5\u03c1\u03b3\u03ac\u03c4\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03c4\u03b9\u03c2 \u03c4\u03bf\u03c0\u03b9\u03ba\u03ad\u03c2 \u03ba\u03bf\u03b9\u03bd\u03c9\u03bd\u03af\u03b5\u03c2 \u03c3\u03c4\u03b9\u03c2 \u03bf\u03c0\u03bf\u03af\u03b5\u03c2 \u03b4\u03c1\u03b1\u03c3\u03c4\u03b7\u03c1\u03b9\u03bf\u03c0\u03bf\u03b9\u03b5\u03af\u03c4\u03b1\u03b9.\n\u0397 \u0395\u03c4\u03b1\u03b9\u03c1\u03af\u03b1 \u03b5\u03c3\u03c4\u03b9\u03ac\u03b6\u03b5\u03b9 \u03b9\u03b4\u03b9\u03b1\u03af\u03c4\u03b5\u03c1\u03b1 \u03c3\u03c4\u03b7\u03bd \u03b1\u03bd\u03ac\u03c0\u03c4\u03c5\u03be\u03b7 \u03c4\u03c9\u03bd \u03b1\u03bd\u03b8\u03c1\u03ce\u03c0\u03c9\u03bd \u03c4\u03b7\u03c2 \u03ba\u03b1\u03b9 \u03c3\u03c4\u03b7 \u03b4\u03b7\u03bc\u03b9\u03bf\u03c5\u03c1\u03b3\u03af\u03b1 \u03b1\u03be\u03af\u03b1\u03c2 \u03b3\u03b9\u03b1 \u03c4\u03bf\u03c5\u03c2 \u03c3\u03c5\u03bc\u03bc\u03b5\u03c4\u03cc\u03c7\u03bf\u03c5\u03c2, \u03c4\u03bf\u03c5\u03c2 \u03c3\u03c5\u03bd\u03b5\u03c1\u03b3\u03ac\u03c4\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03c4\u03b9\u03c2 \u03c4\u03bf\u03c0\u03b9\u03ba\u03ad\u03c2 \u03ba\u03bf\u03b9\u03bd\u03c9\u03bd\u03af\u03b5\u03c2 \u03cc\u03c0\u03bf\u03c5 \u03b4\u03c1\u03b1\u03c3\u03c4\u03b7\u03c1\u03b9\u03bf\u03c0\u03bf\u03b9\u03b5\u03af\u03c4\u03b1\u03b9.\n\n\u039c\u03b5 \u03c4\u03bf \u03b2\u03bb\u03ad\u03bc\u03bc\u03b1 \u03c3\u03c4\u03bf \u03bc\u03ad\u03bb\u03bb\u03bf\u03bd, \u03c3\u03c7\u03b5\u03b4\u03b9\u03ac\u03b6\u03b5\u03b9 \u03c0\u03b5\u03c1\u03b1\u03b9\u03c4\u03ad\u03c1\u03c9 \u03b5\u03c0\u03b5\u03bd\u03b4\u03cd\u03c3\u03b5\u03b9\u03c2 \u03c3\u03b5 \u03c4\u03b5\u03c7\u03bd\u03bf\u03bb\u03bf\u03b3\u03b9\u03ba\u03ad\u03c2 \u03ba\u03b1\u03b9 \u03ba\u03b1\u03b9\u03bd\u03bf\u03c4\u03cc\u03bc\u03b5\u03c2 \u03bb\u03cd\u03c3\u03b5\u03b9\u03c2 \u03ba\u03b1\u03bb\u03c9\u03b4\u03af\u03c9\u03bd, \u03ad\u03c4\u03c3\u03b9 \u03ce\u03c3\u03c4\u03b5 \u03bd\u03b1 \u03c3\u03c5\u03bd\u03b5\u03b9\u03c3\u03c6\u03ad\u03c1\u03b5\u03b9 \u03c3\u03c4\u03b7 \u03b4\u03b7\u03bc\u03b9\u03bf\u03c5\u03c1\u03b3\u03af\u03b1 \u03b5\u03bd\u03cc\u03c2 \u03b2\u03b9\u03ce\u03c3\u03b9\u03bc\u03bf\u03c5 \u03bc\u03ad\u03bb\u03bb\u03bf\u03bd\u03c4\u03bf\u03c2 \u03b3\u03b9\u03b1 \u03c4\u03bf\u03c5\u03c2 \u03c3\u03c5\u03bc\u03bc\u03b5\u03c4\u03cc\u03c7\u03bf\u03c5\u03c2 \u03c4\u03b7\u03c2.\n            "}, {"color": "#1f77b4", "id": "\u03a7\u0391\u039b\u039a\u039f\u03a1", "label": "\u03a7\u0391\u039b\u039a\u039f\u03a1", "shape": "dot", "title": "\n            \u03a7\u0391\u039b\u039a\u039f\u03a1,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae, \u03c4\u03b7 \u03bc\u03b5\u03c4\u03b1\u03c0\u03bf\u03af\u03b7\u03c3\u03b7 \u03ba\u03b1\u03b9 \u03c4\u03b7\u03bd \u03b5\u03bc\u03c0\u03bf\u03c1\u03af\u03b1 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03ba\u03b1\u03b9 \u03ba\u03c1\u03b1\u03bc\u03ac\u03c4\u03c9\u03bd \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd,\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u039c\u03ad\u03c4\u03b1\u03bb\u03bb\u03bf|\u0392\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1,\n            \u039a\u03ad\u03c1\u03b4\u03b7: None\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            H \u03a7\u0391\u039b\u039a\u039f\u03a1 \u03b5\u03af\u03bd\u03b1\u03b9 \u03bf \u03c4\u03bf\u03bc\u03ad\u03b1\u03c2 \u03b4\u03b9\u03ad\u03bb\u03b1\u03c3\u03b7\u03c2 \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u0026 \u03ba\u03c1\u03b1\u03bc\u03ac\u03c4\u03c9\u03bd \u03c4\u03b7\u03c2 ElvalHalcor \u03ba\u03b1\u03b9 \u03bc\u03b1\u03b6\u03af \u03bc\u03b5 \u03c4\u03c1\u03b5\u03b9\u03c2 \u03b1\u03ba\u03cc\u03bc\u03b1 \u03b5\u03c4\u03b1\u03b9\u03c1\u03af\u03b5\u03c2 \u03c3\u03c5\u03b3\u03ba\u03c1\u03bf\u03c4\u03bf\u03cd\u03bd \u03c4\u03bf\u03bd \u03ba\u03bb\u03ac\u03b4\u03bf \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03c4\u03b7\u03c2 ElvalHalcor \u03c0\u03bf\u03c5 \u03b5\u03b9\u03b4\u03b9\u03ba\u03b5\u03cd\u03b5\u03c4\u03b1\u03b9 \u03c3\u03c4\u03b7\u03bd \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae, \u03c4\u03b7 \u03bc\u03b5\u03c4\u03b1\u03c0\u03bf\u03af\u03b7\u03c3\u03b7 \u03ba\u03b1\u03b9 \u03c4\u03b7\u03bd \u03b5\u03bc\u03c0\u03bf\u03c1\u03af\u03b1 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03ba\u03b1\u03b9 \u03ba\u03c1\u03b1\u03bc\u03ac\u03c4\u03c9\u03bd \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03bc\u03b5 \u03b4\u03c5\u03bd\u03b1\u03bc\u03b9\u03ba\u03ae \u03b5\u03bc\u03c0\u03bf\u03c1\u03b9\u03ba\u03ae \u03c0\u03b1\u03c1\u03bf\u03c5\u03c3\u03af\u03b1 \u03c3\u03c4\u03b7\u03bd \u03b5\u03c5\u03c1\u03c9\u03c0\u03b1\u03ca\u03ba\u03ae \u03ba\u03b1\u03b9 \u03c0\u03b1\u03b3\u03ba\u03cc\u03c3\u03bc\u03b9\u03b1 \u03b1\u03b3\u03bf\u03c1\u03ac. \u0393\u03b9\u03b1 \u03c0\u03b5\u03c1\u03b9\u03c3\u03c3\u03cc\u03c4\u03b5\u03c1\u03b1 \u03b1\u03c0\u03cc 80 \u03c7\u03c1\u03cc\u03bd\u03b9\u03b1, \u03b7 \u03a7\u0391\u039b\u039a\u039f\u03a1 \u03c0\u03c1\u03bf\u03c3\u03c6\u03ad\u03c1\u03b5\u03b9 \u03ba\u03b1\u03b9\u03bd\u03bf\u03c4\u03cc\u03bc\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03c0\u03c1\u03bf\u03c3\u03c4\u03b9\u03b8\u03ad\u03bc\u03b5\u03bd\u03b7\u03c2 \u03b1\u03be\u03af\u03b1\u03c2 \u03bb\u03cd\u03c3\u03b5\u03b9\u03c2 \u03c0\u03bf\u03c5 \u03b1\u03bd\u03c4\u03b1\u03c0\u03bf\u03ba\u03c1\u03af\u03bd\u03bf\u03bd\u03c4\u03b1\u03b9 \u03c3\u03c4\u03b9\u03c2 \u03c3\u03cd\u03b3\u03c7\u03c1\u03bf\u03bd\u03b5\u03c2 \u03b1\u03c0\u03b1\u03b9\u03c4\u03ae\u03c3\u03b5\u03b9\u03c2 \u03c4\u03c9\u03bd \u03c0\u03b5\u03bb\u03b1\u03c4\u03ce\u03bd \u03c3\u03b5 \u03c4\u03bf\u03bc\u03b5\u03af\u03c2 \u03cc\u03c0\u03c9\u03c2 \u03c5\u03b4\u03c1\u03b1\u03c5\u03bb\u03b9\u03ba\u03ac, HVAC \u0026 R, \u03b1\u03bd\u03b1\u03bd\u03b5\u03ce\u03c3\u03b9\u03bc\u03b5\u03c2 \u03c0\u03b7\u03b3\u03ad\u03c2 \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2, \u03b1\u03c1\u03c7\u03b9\u03c4\u03b5\u03ba\u03c4\u03bf\u03bd\u03b9\u03ba\u03ae, \u03bc\u03b7\u03c7\u03b1\u03bd\u03b9\u03ba\u03ae \u03ba\u03b1\u03b9 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03b9\u03ba\u03ae \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae.\n\n\u039f \u03ba\u03bb\u03ac\u03b4\u03bf\u03c2 \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03c4\u03b7\u03c2 ElvalHalcor \u03b1\u03c0\u03bf\u03c4\u03b5\u03bb\u03b5\u03af\u03c4\u03b1\u03b9 \u03b1\u03c0\u03cc \u03c4\u03c1\u03b5\u03b9\u03c2 \u03b8\u03c5\u03b3\u03b1\u03c4\u03c1\u03b9\u03ba\u03ad\u03c2 \u03ba\u03b1\u03b9 \u03b4\u03cd\u03bf \u03c3\u03c5\u03bd\u03b5\u03c1\u03b3\u03ac\u03c4\u03b5\u03c2 / \u03ba\u03bf\u03b9\u03bd\u03bf\u03c0\u03c1\u03b1\u03be\u03af\u03b5\u03c2 \u03bc\u03b5 \u03ad\u03b4\u03c1\u03b1 \u03c4\u03b7\u03bd \u0395\u03bb\u03bb\u03ac\u03b4\u03b1, \u03c4\u03bf \u0392\u03ad\u03bb\u03b3\u03b9\u03bf, \u03c4\u03b7 \u0392\u03bf\u03c5\u03bb\u03b3\u03b1\u03c1\u03af\u03b1, \u03c4\u03b7 \u03a1\u03bf\u03c5\u03bc\u03b1\u03bd\u03af\u03b1 \u03ba\u03b1\u03b9 \u03c4\u03b7\u03bd \u03a4\u03bf\u03c5\u03c1\u03ba\u03af\u03b1, \u03b5\u03bd\u03ce \u03b4\u03b9\u03b1\u03b8\u03ad\u03c4\u03b5\u03b9 \u03c3\u03c5\u03bd\u03bf\u03bb\u03b9\u03ba\u03ac \u03bf\u03ba\u03c4\u03ce \u03bc\u03bf\u03bd\u03ac\u03b4\u03b5\u03c2 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae\u03c2 \u03c3\u03c4\u03b7\u03bd \u0395\u03bb\u03bb\u03ac\u03b4\u03b1, \u03c4\u03b7 \u0392\u03bf\u03c5\u03bb\u03b3\u03b1\u03c1\u03af\u03b1 \u03ba\u03b1\u03b9 \u03c4\u03b7\u03bd \u03a4\u03bf\u03c5\u03c1\u03ba\u03af\u03b1. \u039f \u03ba\u03bb\u03ac\u03b4\u03bf\u03c2 \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03c4\u03b7\u03c2 ElvalHalcor \u03b1\u03bd\u03b1\u03c0\u03c4\u03cd\u03c3\u03c3\u03b5\u03b9 \u03ba\u03b1\u03b9 \u03b4\u03b9\u03b1\u03bd\u03ad\u03bc\u03b5\u03b9 \u03ad\u03bd\u03b1 \u03b5\u03c5\u03c1\u03cd \u03c6\u03ac\u03c3\u03bc\u03b1 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd, \u03c3\u03c5\u03bc\u03c0\u03b5\u03c1\u03b9\u03bb\u03b1\u03bc\u03b2\u03b1\u03bd\u03bf\u03bc\u03ad\u03bd\u03c9\u03bd \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03ba\u03b1\u03b9 \u03ba\u03c1\u03ac\u03bc\u03b1\u03c4\u03bf\u03c2 \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03ba\u03b1\u03b9 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03b5\u03be\u03ce\u03b8\u03b7\u03c3\u03b7\u03c2, \u03b5\u03bd\u03ce \u03b7 \u03a7\u0391\u039b\u039a\u039f\u03a1 \u03b5\u03af\u03bd\u03b1\u03b9 \u03bf \u03bc\u03cc\u03bd\u03bf\u03c2 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03cc\u03c2 \u03c3\u03c9\u03bb\u03ae\u03bd\u03c9\u03bd \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03c3\u03c4\u03b7\u03bd \u0395\u03bb\u03bb\u03ac\u03b4\u03b1.\n            "}, {"color": "#1f77b4", "id": "Elval", "label": "Elval", "shape": "dot", "title": "\n            Elval,\n            \u0391\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03bf:\u0397 Elval \u03b1\u03c0\u03bf\u03c4\u03b5\u03bb\u03b5\u03af \u03c4\u03bf\u03bd \u03c4\u03bf\u03bc\u03ad\u03b1 \u03ad\u03bb\u03b1\u03c3\u03b7\u03c2 \u03b1\u03bb\u03bf\u03c5\u03bc\u03b9\u03bd\u03af\u03bf\u03c5 \u03c4\u03b7\u03c2 ElvalHalcor \u0391.\u0395. (ELHA:ATH),\n            \u039a\u03bb\u03ac\u03b4\u03bf\u03b9: \u039c\u03ad\u03c4\u03b1\u03bb\u03bb\u03bf,\n            \u039a\u03ad\u03c1\u03b4\u03b7: None\n            \u03a3\u03b7\u03bc\u03b5\u03b9\u03ce\u03c3\u03b5\u03b9\u03c2:\n            \u03a3\u03c7\u03b5\u03c4\u03b9\u03ba\u03ac \u03bc\u03b5 \u03c4\u03b7\u03bd Elval\n\u0397 Elval \u03b1\u03c0\u03bf\u03c4\u03b5\u03bb\u03b5\u03af \u03c4\u03bf\u03bd \u03c4\u03bf\u03bc\u03ad\u03b1 \u03ad\u03bb\u03b1\u03c3\u03b7\u03c2 \u03b1\u03bb\u03bf\u03c5\u03bc\u03b9\u03bd\u03af\u03bf\u03c5 \u03c4\u03b7\u03c2 ElvalHalcor \u0391.\u0395. (ELHA:ATH), \u03c4\u03b7\u03c2 \u03ba\u03bf\u03c1\u03c5\u03c6\u03b1\u03af\u03b1\u03c2 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1\u03c2 \u03b1\u03bb\u03bf\u03c5\u03bc\u03b9\u03bd\u03af\u03bf\u03c5 \u03ba\u03b1\u03b9 \u03c7\u03b1\u03bb\u03ba\u03bf\u03cd \u03c0\u03b1\u03b3\u03ba\u03bf\u03c3\u03bc\u03af\u03c9\u03c2 \u03bc\u03b5 \u03b9\u03c3\u03c7\u03c5\u03c1\u03ae \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03b9\u03ba\u03ae \u03b2\u03ac\u03c3\u03b7 15 \u03b5\u03c1\u03b3\u03bf\u03c3\u03c4\u03b1\u03c3\u03b9\u03b1\u03ba\u03ce\u03bd \u03bc\u03bf\u03bd\u03ac\u03b4\u03c9\u03bd, \u03c4\u03b5\u03c7\u03bd\u03bf\u03bb\u03bf\u03b3\u03af\u03b1 \u03b1\u03b9\u03c7\u03bc\u03ae\u03c2 \u03ba\u03b1\u03b9 \u03c3\u03c4\u03b1\u03b8\u03b5\u03c1\u03ae \u03c0\u03b1\u03c1\u03bf\u03c5\u03c3\u03af\u03b1 \u03c3\u03b5 \u03c0\u03b5\u03c1\u03b9\u03c3\u03c3\u03cc\u03c4\u03b5\u03c1\u03b5\u03c2 \u03b1\u03c0\u03cc 90 \u03c7\u03ce\u03c1\u03b5\u03c2.\n \n\u0397 Elval \u03b4\u03b9\u03b1\u03b8\u03ad\u03c4\u03b5\u03b9 50 \u03c7\u03c1\u03cc\u03bd\u03b9\u03b1 \u03c4\u03b5\u03c7\u03bd\u03bf\u03b3\u03bd\u03c9\u03c3\u03af\u03b1\u03c2 \u03c3\u03c4\u03b7\u03bd \u03ad\u03bb\u03b1\u03c3\u03b7 \u03ba\u03b1\u03b9 \u03c3\u03c4\u03b7\u03bd \u03b1\u03bd\u03b1\u03ba\u03cd\u03ba\u03bb\u03c9\u03c3\u03b7 \u03b1\u03bb\u03bf\u03c5\u03bc\u03b9\u03bd\u03af\u03bf\u03c5, \u03c3\u03c7\u03b5\u03b4\u03b9\u03ac\u03b6\u03bf\u03bd\u03c4\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ac\u03b6\u03bf\u03bd\u03c4\u03b1\u03c2 \u03ba\u03b1\u03b9\u03bd\u03bf\u03c4\u03cc\u03bc\u03b5\u03c2 \u03bb\u03cd\u03c3\u03b5\u03b9\u03c2, \u03b5\u03bd\u03ce \u03c0\u03b1\u03c1\u03ac\u03bb\u03bb\u03b7\u03bb\u03b1 \u03b4\u03b7\u03bc\u03b9\u03bf\u03c5\u03c1\u03b3\u03b5\u03af \u03b1\u03be\u03b9\u03cc\u03c0\u03b9\u03c3\u03c4\u03b5\u03c2 \u03c3\u03c5\u03bd\u03b5\u03c1\u03b3\u03b1\u03c3\u03af\u03b5\u03c2 \u03c3\u03b5 \u03cc\u03bb\u03bf \u03c4\u03bf\u03bd \u03ba\u03cc\u03c3\u03bc\u03bf. \u03a4\u03bf \u03b5\u03ba\u03c4\u03b5\u03c4\u03b1\u03bc\u03ad\u03bd\u03bf \u03ba\u03b1\u03b9 \u03b5\u03be\u03b1\u03c4\u03bf\u03bc\u03b9\u03ba\u03b5\u03c5\u03bc\u03ad\u03bd\u03bf \u03c7\u03b1\u03c1\u03c4\u03bf\u03c6\u03c5\u03bb\u03ac\u03ba\u03b9\u03bf \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03c9\u03bd \u03b5\u03be\u03c5\u03c0\u03b7\u03c1\u03b5\u03c4\u03b5\u03af \u03c4\u03b9\u03c2 \u03b1\u03b3\u03bf\u03c1\u03ad\u03c2 \u03c3\u03c5\u03c3\u03ba\u03b5\u03c5\u03b1\u03c3\u03af\u03b1\u03c2, \u03bc\u03b5\u03c4\u03b1\u03c6\u03bf\u03c1\u03ce\u03bd, \u03b1\u03c5\u03c4\u03bf\u03ba\u03b9\u03bd\u03b7\u03c4\u03bf\u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1\u03c2, \u03b8\u03ad\u03c1\u03bc\u03b1\u03bd\u03c3\u03b7\u03c2-\u03c8\u03cd\u03be\u03b7\u03c2-\u03ba\u03bb\u03b9\u03bc\u03b1\u03c4\u03b9\u03c3\u03bc\u03bf\u03cd, \u03b4\u03cc\u03bc\u03b7\u03c3\u03b7\u03c2 \u03ba\u03b1\u03b9 \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ce\u03bd, \u03b5\u03bd\u03ad\u03c1\u03b3\u03b5\u03b9\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03b2\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03b9\u03ba\u03ce\u03bd \u03b1\u03b3\u03bf\u03c1\u03ce\u03bd.\n \n\u039c\u03ad\u03c3\u03c9 \u03c3\u03c5\u03bd\u03b5\u03c7\u03ce\u03bd \u03b5\u03c0\u03b5\u03bd\u03b4\u03cd\u03c3\u03b5\u03c9\u03bd \u03c3\u03b5 \u03ad\u03c1\u03b5\u03c5\u03bd\u03b1, \u03b1\u03bd\u03ac\u03c0\u03c4\u03c5\u03be\u03b7, \u03ba\u03b1\u03b9\u03bd\u03bf\u03c4\u03bf\u03bc\u03af\u03b1 \u03ba\u03b1\u03b9 \u03b4\u03b9\u03b1\u03b8\u03ad\u03c4\u03bf\u03bd\u03c4\u03b1\u03c2 \u03b5\u03c3\u03c9\u03c4\u03b5\u03c1\u03b9\u03ba\u03cc \u039a\u03ad\u03bd\u03c4\u03c1\u03bf \u03a4\u03b5\u03c7\u03bd\u03bf\u03bb\u03bf\u03b3\u03af\u03b1\u03c2, \u03b5\u03c0\u03b5\u03bd\u03b4\u03cd\u03bf\u03c5\u03bc\u03b5 \u03c3\u03b5 \u03b1\u03bd\u03b8\u03c1\u03ce\u03c0\u03b9\u03bd\u03bf \u03b4\u03c5\u03bd\u03b1\u03bc\u03b9\u03ba\u03cc \u03bc\u03b5 \u03c5\u03c8\u03b7\u03bb\u03ae \u03b5\u03be\u03b5\u03b9\u03b4\u03af\u03ba\u03b5\u03c5\u03c3\u03b7 \u03ba\u03b1\u03b9 \u03c4\u03b5\u03c7\u03bd\u03bf\u03b3\u03bd\u03c9\u03c3\u03af\u03b1, \u03c3\u03c4\u03b7\u03bd \u03c5\u03c0\u03b5\u03cd\u03b8\u03c5\u03bd\u03b7 \u03c0\u03b1\u03c1\u03b1\u03b3\u03c9\u03b3\u03ae \u03ba\u03b1\u03b9 \u03c3\u03c4\u03b7\u03bd \u03c0\u03c1\u03bf\u03c3\u03c4\u03b1\u03c3\u03af\u03b1 \u03c4\u03bf\u03c5 \u03c0\u03b5\u03c1\u03b9\u03b2\u03ac\u03bb\u03bb\u03bf\u03bd\u03c4\u03bf\u03c2, \u03c3\u03c4\u03b7\u03c1\u03af\u03b6\u03bf\u03bd\u03c4\u03b1\u03c2 \u03c4\u03b7 \u03bc\u03b5\u03c4\u03ac\u03b2\u03b1\u03c3\u03b7 \u03c3\u03c4\u03b7\u03bd \u03ba\u03bb\u03b9\u03bc\u03b1\u03c4\u03b9\u03ba\u03ae \u03bf\u03c5\u03b4\u03b5\u03c4\u03b5\u03c1\u03cc\u03c4\u03b7\u03c4\u03b1 \u03ba\u03b1\u03b9 \u03c4\u03b7 \u03c3\u03c5\u03bc\u03b2\u03bf\u03bb\u03ae \u03c4\u03bf\u03c5 \u03b1\u03bb\u03bf\u03c5\u03bc\u03b9\u03bd\u03af\u03bf\u03c5 \u03c3\u03c4\u03b7\u03bd \u03ba\u03c5\u03ba\u03bb\u03b9\u03ba\u03ae \u03bf\u03b9\u03ba\u03bf\u03bd\u03bf\u03bc\u03af\u03b1.\n            "}, {"color": "#1f77b4", "id": "\u0395\u039b\u0392\u0391\u039b\u03a7\u0391\u039b\u039a\u039f\u03a1 \u0395\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ae \u0392\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1 \u03a7\u03b1\u03bb\u03ba\u03bf\u03cd \u03ba\u03b1\u03b9 \u0391\u03bb\u03bf\u03c5\u03bc\u03b9\u03bd\u03af\u03bf\u03c5 \u0391\u03bd\u03ce\u03bd\u03c5\u03bc\u03bf\u03c2 \u0395\u03c4\u03b1\u03b9\u03c1\u03b5\u03af\u03b1 (ElvalHalcor)", "label": "\u0395\u039b\u0392\u0391\u039b\u03a7\u0391\u039b\u039a\u039f\u03a1 \u0395\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ae \u0392\u03b9\u03bf\u03bc\u03b7\u03c7\u03b1\u03bd\u03af\u03b1 \u03a7\u03b1\u03bb\u03ba\u03bf\u03cd \u03ba\u03b1\u03b9 \u0391\u03bb\u03bf\u03c5\u03bc\u03b9\u03bd\u03af\u03bf\u03c5
